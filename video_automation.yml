name: Betrayal DeepDive — YouTube Automation

on:
  schedule:
    - cron: "0 1 * * 1,3,5"
  workflow_dispatch:

jobs:
  run-automation:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      GROQ_API_KEY:          ${{ secrets.GROQ_API_KEY }}
      PIXABAY_KEY:           ${{ secrets.PIXABAY_KEY }}
      TELEGRAM_TOKEN:        ${{ secrets.TELEGRAM_TOKEN }}
      TELEGRAM_CHAT_ID:      ${{ secrets.TELEGRAM_CHAT_ID }}
      YOUTUBE_CLIENT_ID:     ${{ secrets.YOUTUBE_CLIENT_ID }}
      YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
      YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
      NEWS_API_KEY:          ${{ secrets.NEWS_API_KEY }}
      YOUTUBE_DATA_API_KEY:  ${{ secrets.YOUTUBE_DATA_API_KEY }}
      GEMINI_API_KEY:        ${{ secrets.GEMINI_API_KEY }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install FFmpeg and fonts
        run: sudo apt-get update -qq && sudo apt-get install -y ffmpeg fonts-dejavu-core libass-dev

      - name: Install packages
        run: pip install requests google-auth google-auth-oauthlib google-api-python-client gspread oauth2client Pillow

      - name: Run video automation
        run: python video_server.py
