# ============================================================
# THE CONTROL FILES — Ch3 Generation Workflow
# Phase 1: GENERATE only (no upload)
# Runs: Mon-Fri 3:30 AM IST = 22:00 UTC (3h after Ch2 generate)
# Full token quota recovery — all providers reset between runs
# Niches: Cult Psychology, Propaganda Systems, Social Engineering,
#         Mass Deception, Dark Business Docs, Scams & Fraud Exposed
# Features: 13-attempt engine, SSML audio, stage-matched video,
#           3-variant cold open, pattern memory, 6 Shorts per video
# ============================================================
name: Ch3 Control Files — Generate

on:
  schedule:
    - cron: '0 22 * * 1-5'   # 3:30 AM IST | Mon-Fri
  workflow_dispatch:
    inputs:
      is_makeup:
        description: 'Resume from checkpoint'
        required: false
        default: 'false'
        type: choice
        options: ['false','true']

env:
  PYTHONUNBUFFERED: "1"
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: "true"
  PHASE: "generate"

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg fonts-dejavu-core fonts-liberation -qq
          pip install requests pillow edge-tts -q

      - name: Pull latest state
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Actions"
          git pull --rebase origin main || true

      - name: Generate video (no upload)
        env:
          CEREBRAS_API_KEY:          ${{ secrets.CEREBRAS_API_KEY }}
          SAMBANOVA_API_KEY:         ${{ secrets.SAMBANOVA_API_KEY }}
          GEMINI_API_KEY:            ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY_2:          ${{ secrets.GEMINI_API_KEY_2 }}
          GROQ_API_KEY:              ${{ secrets.GROQ_API_KEY }}
          OPENROUTER_API_KEY:        ${{ secrets.OPENROUTER_API_KEY }}
          COHERE_API_KEY:            ${{ secrets.COHERE_API_KEY }}
          MISTRAL_API_KEY:           ${{ secrets.MISTRAL_API_KEY }}
          PIXABAY_KEY:               ${{ secrets.PIXABAY_KEY }}
          PEXELS_API_KEY:            ${{ secrets.PEXELS_API_KEY }}
          TELEGRAM_TOKEN:            ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:          ${{ secrets.TELEGRAM_CHAT_ID }}
          CHANNEL3_YT_CLIENT_ID:     ${{ secrets.CHANNEL3_YT_CLIENT_ID }}
          CHANNEL3_YT_CLIENT_SECRET: ${{ secrets.CHANNEL3_YT_CLIENT_SECRET }}
          CHANNEL3_YT_REFRESH_TOKEN: ${{ secrets.CHANNEL3_YT_REFRESH_TOKEN }}
          YOUTUBE_CLIENT_ID:         ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET:     ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN:     ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          PIPELINE_PHASE:            "generate"
          IS_MAKEUP:                 ${{ github.event.inputs.is_makeup || 'false' }}
        run: |
          export PYTHONPATH="${PYTHONPATH}:$(pwd)/channels"
          python -u channels/control_files/control_files_pipeline.py

      # ── FIX: persist rendered video/audio/thumbnail across runners ──
      - name: Upload video artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ch3-pending-video
          path: /home/runner/work/control_files/*
          retention-days: 2
          if-no-files-found: warn

      - name: Commit generated artifacts + state
        if: always()
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Actions"
          git add channels/control_files/state.json \
                  channels/control_files/intel.json \
                  channels/control_files/pending_upload.json || true
          git diff --staged --quiet || git commit -m "chore: ch3 generated [skip ci]"
          git push origin main || true
