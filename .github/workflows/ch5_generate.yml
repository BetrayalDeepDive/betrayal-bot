# ============================================================
# THE ARCHIVE — Ch5 Generation Workflow
# Phase 1: GENERATE only (no upload)
# Runs: Mon-Fri 3:30 AM IST = 22:00 UTC (3h after Ch2 generate)
# Full token quota recovery — all providers reset between runs
# Niches: Cult Psychology, Propaganda Systems, Social Engineering,
#         Mass Deception, Dark Business Docs, Scams & Fraud Exposed
# Features: 13-attempt graduated quality gate (8.8/7.0/6.9), whiteboard/
#           doodle stroke-reveal animation, SSML multi-rate + Kokoro
#           local TTS, real cold-open scoring, pattern memory, real-case
#           research grounding, 4 Shorts per video (teaser + 2
#           standalone in this phase, 1 recap in the upload phase),
#           real description quality scoring, and the full v5 human
#           review-gate system (Script / Audio+Video / Title+Thumbnail+
#           Description / Shorts checkpoints, Telegram + Gmail fallback)
# ============================================================
name: Ch5 The Collapse Index — Generate

on:
  schedule:
    - cron: '0 3 * * 1-5'   # 8:30 AM IST | Mon-Fri (2.5h after Ch4 generate; was an exact duplicate of Ch4's schedule)
  workflow_dispatch:
    inputs:
      is_makeup:
        description: 'Resume from checkpoint'
        required: false
        default: 'false'
        type: choice
        options: ['false','true']

env:
  PYTHONUNBUFFERED: "1"
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: "true"
  PHASE: "generate"

jobs:
  generate:
    runs-on: ubuntu-latest
    # FIX (v5): raised to 360 — GitHub Actions' real hosted-runner hard
    # ceiling (this cannot go higher regardless of what's set here). The
    # audio-retry loop alone can now consume up to 4 real hours (2
    # retries x 2h wait) before the review-gate's own 4.5h budget even
    # starts — a genuine time-budget tension, not something silently
    # designed around by shortening either number, since both match the
    # explicit, already-proven Ch1/2 pattern. On a genuinely bad day
    # (robotic TTS AND a slow reviewer) this job can still be killed by
    # the platform's own 6h ceiling — the same honest, accepted rare-case
    # risk already present in Ch1/2, not a new one introduced here.
    timeout-minutes: 360
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg fonts-dejavu-core fonts-liberation espeak-ng -qq
          pip install requests pillow edge-tts gTTS matplotlib -q
          # v5 addition: Kokoro TTS — real local model, no API rate limit.
          # CPU-only torch wheel specifically (avoids downloading
          # unnecessary CUDA packages that would slow this step down and
          # aren't usable on a GitHub Actions runner anyway).
          pip install torch --index-url https://download.pytorch.org/whl/cpu -q
          pip install kokoro soundfile -q

      - name: Pull latest state
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Actions"
          git pull --rebase origin main || true

      - name: Generate video (no upload)
        env:
          CEREBRAS_API_KEY:          ${{ secrets.CEREBRAS_API_KEY }}
          SAMBANOVA_API_KEY:         ${{ secrets.SAMBANOVA_API_KEY }}
          GEMINI_API_KEY:            ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY_2:          ${{ secrets.GEMINI_API_KEY_2 }}
          GROQ_API_KEY:              ${{ secrets.GROQ_API_KEY }}
          OPENROUTER_API_KEY:        ${{ secrets.OPENROUTER_API_KEY }}
          COHERE_API_KEY:            ${{ secrets.COHERE_API_KEY }}
          MISTRAL_API_KEY:           ${{ secrets.MISTRAL_API_KEY }}
          PIXABAY_KEY:               ${{ secrets.PIXABAY_KEY }}
          PEXELS_API_KEY:            ${{ secrets.PEXELS_API_KEY }}
          # Optional — same NewsAPI enhancement as ch3_upload.yml (Shorts
          # get produced/uploaded in both phases).
          NEWS_API_KEY:              ${{ secrets.NEWS_API_KEY }}
          TELEGRAM_TOKEN:            ${{ secrets.TELEGRAM_TOKEN }}
          FISH_AUDIO_API_KEY:    ${{ secrets.FISH_AUDIO_API_KEY }}  # optional TTS backup — leave secret empty/unset if not using it
          TELEGRAM_CHAT_ID:          ${{ secrets.TELEGRAM_CHAT_ID }}
          # v5 addition: Ch5's own dedicated bot (The Collapse Index Bot,
          # already created per the project owner) — matches the exact
          # real fix already applied for Ch2 (was silently using Ch1's
          # bot before). The generic TELEGRAM_TOKEN/CHAT_ID above remain
          # only as a fallback the pipeline code itself falls back to if
          # these aren't set — always set these for real channel isolation.
          TELEGRAM_TOKEN_CH5:        ${{ secrets.TELEGRAM_TOKEN_CH5 }}
          TELEGRAM_CHAT_ID_CH5:      ${{ secrets.TELEGRAM_CHAT_ID_CH5 }}
          # v5 addition: Gmail two-way fallback (same mechanism as
          # Ch1/Ch2) — if Telegram is ever down/slow, review replies can
          # come via email instead, using the same real decision parser.
          GMAIL_SENDER_EMAIL:        ${{ secrets.GMAIL_SENDER_EMAIL }}
          GMAIL_APP_PASSWORD:        ${{ secrets.GMAIL_APP_PASSWORD }}
          CHANNEL5_YT_CLIENT_ID:     ${{ secrets.CHANNEL5_YT_CLIENT_ID }}
          CHANNEL5_YT_CLIENT_SECRET: ${{ secrets.CHANNEL5_YT_CLIENT_SECRET }}
          CHANNEL5_YT_REFRESH_TOKEN: ${{ secrets.CHANNEL5_YT_REFRESH_TOKEN }}
          YOUTUBE_CLIENT_ID:         ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET:     ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN:     ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          PIPELINE_PHASE:            "generate"
          IS_MAKEUP:                 ${{ github.event.inputs.is_makeup || 'false' }}
        run: |
          # FIX: same PYTHONPATH gap as upload.yml — video_pipeline/ added,
          # required by every shared-module integration wired in this session.
          export PYTHONPATH="${PYTHONPATH}:$(pwd)/channels:$(pwd)/video_pipeline"
          python -u channels/collapse_index/collapse_index_pipeline.py

      # ── FIX: persist rendered video/audio/thumbnail across runners ──
      - name: Upload video artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ch5-pending-video
          path: /tmp/deepdive/*
          retention-days: 2
          if-no-files-found: warn

      - name: Commit generated artifacts + state
        if: always()
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Actions"
          # FIX: one git add per file. Previously all paths were in a single
          # git add command — if ANY one file didn't exist (e.g. next_week_strategy.json
          # only gets created on certain episodes), git aborted the WHOLE add as fatal,
          # silently swallowed by the old "|| true", and NOTHING got staged — not even
          # files that did exist. This is why pushes looked successful but saved nothing.
          git add channels/collapse_index/state.json || true
          git add channels/collapse_index/intel.json || true
          git add channels/collapse_index/pending_upload.json || true
          # CRITICAL FIX (found on most advanced re-audit): review_queue.json
          # was never committed anywhere. Since the generate and upload
          # phases run as completely separate GitHub Actions jobs (each a
          # fresh checkout on a fresh ephemeral runner), this file's state
          # — which checkpoint we're at, how many check-ins have been
          # used, the whole "only one episode in review at a time" guarantee
          # — would be silently WIPED the moment this job's runner
          # terminates. The next day's generate phase would then find no
          # review_queue.json at all, is_channel_review_busy() would
          # ALWAYS return False, and the entire cross-episode-confusion
          # protection this system was explicitly built to provide would
          # never actually function — while looking completely correct in
          # any single-job test, since the file exists fine for the
          # duration of that one process. Proved this exact failure mode
          # with a direct simulation before writing this fix.
          git add channels/collapse_index/review_queue.json || true
          # FIX: thumb_format_history.json / shorts_format_history.json
          # (real, appended-to learning history for the 11-format
          # thumbnail library and Shorts format-variety rotation) were
          # never explicitly added — same "ephemeral runner, nothing
          # persists unless committed" bug already fixed for every other
          # state file above.
          git add channels/collapse_index/thumb_format_history.json || true
          git add channels/collapse_index/shorts_format_history.json || true
          git diff --staged --quiet || git commit -m "chore: ch5 generated [skip ci]"
          # FIX: retry push instead of silently dropping it on conflict.
          # "|| true" alone meant a failed push (e.g. two workflows landing
          # near the same time) was swallowed with zero indication — the
          # commit would exist locally on that dead runner and nowhere else.
          for i in 1 2 3 4 5; do
            if git push origin main; then
              echo "Push succeeded on attempt $i"
              break
            fi
            echo "Push failed (attempt $i) — pulling + retrying in $((i*5))s"
            sleep $((i*5))
            git pull --rebase origin main || true
            if [ "$i" = "5" ]; then
              echo "::error::Push failed after 5 attempts — commit did NOT reach GitHub"
            fi
          done
