# ============================================================
# THE COLLAPSE INDEX — Ch5 Generation Workflow
# Phase 1: GENERATE only (no upload)
# Runs: Mon-Fri 8:30 AM IST = 03:00 UTC
# 2.5h after Ch4 generate — full token quota recovery
# Niches: AI Failures, Surveillance Capitalism, Tech Displacement,
#         Algorithmic Society, Collapse Scenarios, Cybersecurity
# ============================================================
name: Ch5 The Collapse Index — Generate

on:
  schedule:
    - cron: '0 3 * * 1-5'   # 8:30 AM IST | Mon-Fri
  workflow_dispatch:
    inputs:
      is_makeup:
        description: 'Resume from checkpoint'
        required: false
        default: 'false'
        type: choice
        options: ['false','true']

env:
  PYTHONUNBUFFERED: "1"
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: "true"
  PHASE: "generate"

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg fonts-dejavu-core fonts-liberation -qq
          pip install requests pillow edge-tts -q

      - name: Pull latest state
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Actions"
          git pull --rebase origin main || true

      - name: Generate video (no upload)
        env:
          CEREBRAS_API_KEY:           ${{ secrets.CEREBRAS_API_KEY }}
          SAMBANOVA_API_KEY:          ${{ secrets.SAMBANOVA_API_KEY }}
          GEMINI_API_KEY:             ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY_2:           ${{ secrets.GEMINI_API_KEY_2 }}
          GROQ_API_KEY:               ${{ secrets.GROQ_API_KEY }}
          OPENROUTER_API_KEY:         ${{ secrets.OPENROUTER_API_KEY }}
          COHERE_API_KEY:             ${{ secrets.COHERE_API_KEY }}
          MISTRAL_API_KEY:            ${{ secrets.MISTRAL_API_KEY }}
          PIXABAY_KEY:                ${{ secrets.PIXABAY_KEY }}
          PEXELS_API_KEY:             ${{ secrets.PEXELS_API_KEY }}
          TELEGRAM_TOKEN:             ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:           ${{ secrets.TELEGRAM_CHAT_ID }}
          PIPELINE_PHASE:             "generate"
          COLLAPSE_YT_CLIENT_ID:      ${{ secrets.COLLAPSE_YT_CLIENT_ID }}
          COLLAPSE_YT_CLIENT_SECRET:  ${{ secrets.COLLAPSE_YT_CLIENT_SECRET }}
          COLLAPSE_YT_REFRESH_TOKEN:  ${{ secrets.COLLAPSE_YT_REFRESH_TOKEN }}
          IS_MAKEUP:                  ${{ github.event.inputs.is_makeup || 'false' }}
        run: |
          export PYTHONPATH="${PYTHONPATH}:$(pwd)/channels"
          python -u channels/collapse_index/collapse_index_pipeline.py

      # ── FIX: persist rendered video/audio/thumbnail across runners ──
      - name: Upload video artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ch5-pending-video
          path: /tmp/collapse_index/*
          retention-days: 2
          if-no-files-found: warn

      - name: Commit generated artifacts + state
        if: always()
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Actions"
          # FIX: one git add per file. Previously all paths were in a single
          # git add command — if ANY one file didn't exist (e.g. next_week_strategy.json
          # only gets created on certain episodes), git aborted the WHOLE add as fatal,
          # silently swallowed by the old "|| true", and NOTHING got staged — not even
          # files that did exist. This is why pushes looked successful but saved nothing.
          git add channels/collapse_index/collapse_state.json || true
          git add channels/collapse_index/collapse_intel.json || true
          git add channels/collapse_index/pending_upload.json || true
          git diff --staged --quiet || git commit -m "chore: ch5 generated [skip ci]"
          # FIX: retry push instead of silently dropping it on conflict.
          # "|| true" alone meant a failed push (e.g. two workflows landing
          # near the same time) was swallowed with zero indication — the
          # commit would exist locally on that dead runner and nowhere else.
          for i in 1 2 3 4 5; do
            if git push origin main; then
              echo "Push succeeded on attempt $i"
              break
            fi
            echo "Push failed (attempt $i) — pulling + retrying in $((i*5))s"
            sleep $((i*5))
            git pull --rebase origin main || true
            if [ "$i" = "5" ]; then
              echo "::error::Push failed after 5 attempts — commit did NOT reach GitHub"
            fi
          done
