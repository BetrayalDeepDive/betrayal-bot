name: Ch4 The Archive — Generate

on:
  schedule:
    # Runs at 1:00 AM IST (7:30 PM UTC previous day)
    - cron: '30 19 * * *'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests edge-tts pillow google-auth-oauthlib \
                      google-auth-httplib2 google-api-python-client \
                      moviepy ffmpeg-python 2>/dev/null || true
          sudo apt-get install -y ffmpeg 2>/dev/null || true

      - name: Pull latest state
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Actions"
          git pull origin main --rebase || true

      - name: Generate video (no upload)
        env:
          PIPELINE_PHASE: generate
          WORK_DIR: /tmp/archive
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          SAMBANOVA_API_KEY: ${{ secrets.SAMBANOVA_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_2 }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          COHERE_API_KEY: ${{ secrets.COHERE_API_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          PIXABAY_KEY: ${{ secrets.PIXABAY_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          ARCHIVE_YT_CLIENT_ID: ${{ secrets.ARCHIVE_YT_CLIENT_ID }}
          ARCHIVE_YT_CLIENT_SECRET: ${{ secrets.ARCHIVE_YT_CLIENT_SECRET }}
          ARCHIVE_YT_REFRESH_TOKEN: ${{ secrets.ARCHIVE_YT_REFRESH_TOKEN }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          export PYTHONPATH="${PYTHONPATH}:$(pwd)/channels"
          python channels/archive/archive_pipeline.py

      - name: Commit generated artifacts + state
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Actions"
          cp /tmp/archive/pending_upload.json channels/archive/pending_upload.json 2>/dev/null || true
          cp /tmp/archive/archive_state.json  channels/archive/archive_state.json  2>/dev/null || true
          git add -A
          git diff --staged --quiet || git commit -m "Ch4 Archive: generated $(date '+%Y-%m-%d')"
          git push origin main || true

      - name: Post Run cleanup
        uses: actions/setup-python@v5
        if: always()
        with:
          python-version: '3.11'
