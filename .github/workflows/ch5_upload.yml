# ============================================================
# THE COLLAPSE INDEX — Ch5 Upload Workflow
# Phase 2: UPLOAD only (reads from pending_upload.json in repo)
# Runs: Tue-Sat 10:00 PM IST = 16:30 UTC
# 30 min after Ch4 upload — staggered so YouTube indexes separately
# US: 12:30 PM ET | UK: 5:30 PM BST — US afternoon peak
# ============================================================
name: Ch5 The Collapse Index — Upload

on:
  schedule:
    - cron: '30 16 * * 2-6'   # 10:00 PM IST | Tue-Sat
  workflow_dispatch:

env:
  PYTHONUNBUFFERED: "1"
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: "true"
  PHASE: "upload"

jobs:
  upload:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pillow -q

      - name: Pull latest state
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Actions"
          git pull --rebase origin main || true

      # ── FIX: pull back actual video/audio/thumbnail files from Generate ──
      - name: Download video artifact from latest Generate run
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: ch5_generate.yml
          name: ch5-pending-video
          path: /home/runner/work/collapse_index
          workflow_conclusion: success
          if_no_artifact_found: fail

      - name: Upload pre-generated video
        env:
          COLLAPSE_YT_CLIENT_ID:      ${{ secrets.COLLAPSE_YT_CLIENT_ID }}
          COLLAPSE_YT_CLIENT_SECRET:  ${{ secrets.COLLAPSE_YT_CLIENT_SECRET }}
          COLLAPSE_YT_REFRESH_TOKEN:  ${{ secrets.COLLAPSE_YT_REFRESH_TOKEN }}
          TELEGRAM_TOKEN:             ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:           ${{ secrets.TELEGRAM_CHAT_ID }}
          PIPELINE_PHASE:             "upload"
        run: |
          export PYTHONPATH="${PYTHONPATH}:$(pwd)/channels"
          python -u channels/collapse_index/collapse_index_pipeline.py

      - name: Commit upload state
        if: always()
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Actions"
          git add channels/collapse_index/collapse_state.json \
                  channels/collapse_index/pending_upload.json || true
          git diff --staged --quiet || git commit -m "chore: ch5 uploaded [skip ci]"
          git push origin main || true
