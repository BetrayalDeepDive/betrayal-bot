name: DeepDive Empire - Video Pipeline

on:
  schedule:
    - cron: "0 2 * * 1"
    - cron: "0 2 * * 2"
    - cron: "0 2 * * 3"
    - cron: "0 2 * * 4"
    - cron: "0 2 * * 5"
    - cron: "30 3 * * 0"
  workflow_dispatch:
    inputs:
      is_makeup:
        description: 'Makeup video?'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

jobs:

  weekly-report:
    if: github.event.schedule == '30 3 * * 0'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-python@v5.6.0
        with: { python-version: "3.11" }
      - run: pip install requests --break-system-packages -q
      - name: Send weekly report
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python video_pipeline/weekly_report.py

  make-video:
    if: github.event.schedule != '30 3 * * 0'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-python@v5.6.0
        with: { python-version: "3.11" }
      - name: Install all dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg -qq
          pip install groq requests edge-tts --break-system-packages -q
      - name: Run complete video pipeline
        env:
          PYTHONUNBUFFERED:      "1"
          GROQ_API_KEY:          ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY:        ${{ secrets.GEMINI_API_KEY }}
          PIXABAY_KEY:           ${{ secrets.PIXABAY_KEY }}
          YOUTUBE_CLIENT_ID:     ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          TELEGRAM_TOKEN:        ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:      ${{ secrets.TELEGRAM_CHAT_ID }}
          GITHUB_RUN_ID:         ${{ github.run_id }}
          IS_MAKEUP:             ${{ github.event.inputs.is_makeup || 'false' }}
        run: python -u video_pipeline/master_pipeline.py

  support-bot:
    if: always() && github.event.schedule != '30 3 * * 0'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-python@v5.6.0
        with: { python-version: "3.11" }
      - run: pip install groq requests --break-system-packages -q
      - name: Support bot
        env:
          GROQ_API_KEY:       ${{ secrets.GROQ_API_KEY }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          TELEGRAM_TOKEN:     ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python freelance/scripts/support_bot.py || echo "Done"

  fiverr-bot:
    if: always() && github.event.schedule != '30 3 * * 0'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-python@v5.6.0
        with: { python-version: "3.11" }
      - run: pip install groq requests --break-system-packages -q
      - name: Fiverr bot
        env:
          GROQ_API_KEY:       ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY:     ${{ secrets.GEMINI_API_KEY }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          TELEGRAM_TOKEN:     ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python freelance/scripts/fiverr_bot.py || echo "Done"
