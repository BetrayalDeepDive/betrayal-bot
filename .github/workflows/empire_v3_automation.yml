name: DeepDive Empire - Video Pipeline v8.0

on:
  schedule:
    - cron: '0 2 * * 1'  # Monday 2 AM UTC = 7:30 AM IST
    - cron: '0 2 * * 2'  # Tuesday
    - cron: '0 2 * * 3'  # Wednesday
    - cron: '0 2 * * 4'  # Thursday
    - cron: '0 2 * * 5'  # Friday
    - cron: '30 3 * * 0' # Sunday 3:30 AM UTC (weekly report)
  workflow_dispatch:
    inputs:
      is_makeup:
        description: 'Makeup video (rerun if failed)'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

env:
  PYTHONUNBUFFERED: 1
  GITHUB_RUN_ID: ${{ github.run_id }}

jobs:

  weekly-report:
    if: github.event.schedule == '30 3 * * 0'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests --break-system-packages -q
      - name: Weekly report
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python video_pipeline/weekly_report.py || echo "Weekly report skipped"

  make-video:
    if: github.event.schedule != '30 3 * * 0'
    runs-on: ubuntu-latest
    timeout-minutes: 150
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg -qq

      - name: Install Python dependencies
        run: |
          pip install groq requests edge-tts --break-system-packages -q

      - name: Run master pipeline v8.0
        env:
          # Script Providers (4 fallbacks)
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          
          # Audio Provider
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          
          # Video Sources (2 fallbacks)
          PIXABAY_KEY: ${{ secrets.PIXABAY_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          
          # YouTube Upload
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          
          # Notifications
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          
          # Config
          IS_MAKEUP: ${{ github.event.inputs.is_makeup || 'false' }}
        run: python -u video_pipeline/master_pipeline.py

  support-bot:
    if: always() && github.event.schedule != '30 3 * * 0'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [make-video]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install groq requests --break-system-packages -q
      - name: Support bot
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python freelance/scripts/support_bot.py || echo "Done"

  fiverr-bot:
    if: always() && github.event.schedule != '30 3 * * 0'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [make-video]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install groq requests --break-system-packages -q
      - name: Fiverr bot
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python freelance/scripts/fiverr_bot.py || echo "Done"
