name: Empire V3 - 5 Videos Per Week

on:
  schedule:
    - cron: '0 2 * * 1'
    - cron: '0 2 * * 2'
    - cron: '0 2 * * 3'
    - cron: '0 2 * * 4'
    - cron: '0 2 * * 5'
    - cron: '30 3 * * 0'
  workflow_dispatch:

jobs:

  weekly-report:
    if: github.event.schedule == '30 3 * * 0'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests --break-system-packages -q
      - name: Send weekly report
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python video_pipeline/weekly_report.py

  generate-script:
    if: github.event.schedule != '30 3 * * 0'
    runs-on: ubuntu-latest
    timeout-minutes: 35
    outputs:
      approved: ${{ steps.gen.outputs.approved }}
      run_id:   ${{ steps.gen.outputs.run_id }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - name: Install dependencies
        run: pip install groq requests --break-system-packages -q
      - name: Generate script
        id: gen
        env:
          GROQ_API_KEY:     ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY:   ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GITHUB_RUN_ID:    ${{ github.run_id }}
        run: python video_pipeline/stage1_script.py
      - name: Save script artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-script-${{ github.run_id }}
          path: /tmp/pipeline_data/
          retention-days: 1

  generate-audio:
    needs: generate-script
    if: needs.generate-script.outputs.approved == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - name: Download script artifact
        uses: actions/download-artifact@v4
        with:
          name: pipeline-script-${{ github.run_id }}
          path: /tmp/pipeline_data/
      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg -qq
          pip install edge-tts requests --break-system-packages -q
      - name: Generate audio
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python video_pipeline/stage2_audio.py
      - name: Save audio artifact
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-audio-${{ github.run_id }}
          path: /tmp/pipeline_data/
          retention-days: 1

  assemble-video:
    needs: generate-audio
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg -qq
          pip install requests --break-system-packages -q
      - name: Download audio artifact
        uses: actions/download-artifact@v4
        with:
          name: pipeline-audio-${{ github.run_id }}
          path: /tmp/pipeline_data/
      - name: Assemble video
        env:
          PIXABAY_KEY:      ${{ secrets.PIXABAY_KEY }}
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GITHUB_TOKEN:     ${{ secrets.GITHUB_TOKEN }}
          GITHUB_RUN_ID:    ${{ github.run_id }}
          GITHUB_REPO:      ${{ github.repository }}
        run: python video_pipeline/stage3_video.py
      - name: Save video artifact
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-video-${{ github.run_id }}
          path: /tmp/pipeline_data/
          retention-days: 1

  upload-with-approval:
    needs: assemble-video
    runs-on: ubuntu-latest
    timeout-minutes: 150
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests --break-system-packages -q
      - name: Download video artifact
        uses: actions/download-artifact@v4
        with:
          name: pipeline-video-${{ github.run_id }}
          path: /tmp/pipeline_data/
      - name: Upload to YouTube
        env:
          YOUTUBE_CLIENT_ID:     ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          TELEGRAM_TOKEN:        ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:      ${{ secrets.TELEGRAM_CHAT_ID }}
          GITHUB_TOKEN:          ${{ secrets.GITHUB_TOKEN }}
          GITHUB_RUN_ID:         ${{ github.run_id }}
          GITHUB_REPO:           ${{ github.repository }}
        run: python video_pipeline/stage4_upload.py

  support-bot:
    if: always() && github.event.schedule != '30 3 * * 0'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install groq requests --break-system-packages -q
      - name: Run support bot
        env:
          GROQ_API_KEY:       ${{ secrets.GROQ_API_KEY }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          TELEGRAM_TOKEN:     ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python freelance/scripts/support_bot.py || echo "Done"

  fiverr-bot:
    if: always() && github.event.schedule != '30 3 * * 0'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install groq requests --break-system-packages -q
      - name: Run Fiverr bot
        env:
          GROQ_API_KEY:       ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY:     ${{ secrets.GEMINI_API_KEY }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          TELEGRAM_TOKEN:     ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python freelance/scripts/fiverr_bot.py || echo "Done"
