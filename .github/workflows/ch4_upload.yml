# ============================================================
# THE ARCHIVE — Ch4 Upload Workflow
# Phase 2: UPLOAD only (reads pending_upload.json from repo)
# Runs: Tue-Sat 1:30 AM IST = 20:00 UTC (1h after Ch3 upload)
# US: 4 PM ET | UK: 9 PM BST — prime UK evening + US afternoon
# ============================================================
name: Ch4 The Archive — Upload

on:
  # PAUSED (2026-07-24, explicit user request): all automations disabled
  # while outstanding Ch1-5 pipeline bugs are being found and fixed.
  # workflow_dispatch below still works for manual runs. Re-enable by
  # uncommenting the schedule block once fixes are confirmed.
  # schedule:
  #   - cron: '0 20 * * 2-6'   # 1:30 AM IST | Tue-Sat (1h after Ch3 upload)
  workflow_dispatch:

env:
  PYTHONUNBUFFERED: "1"
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: "true"
  PHASE: "upload"

# FIX (found on deep re-audit): no concurrency guard existed on any
# of the 10 workflows -- a manual workflow_dispatch/is_makeup re-run
# while a previous run for this same channel+phase is still polling
# Telegram for a review decision could run two full pipeline
# processes in parallel: duplicate script generation burning real AI
# provider quota, two review conversations landing in the same
# Telegram chat at once, and a git-push race where whichever process
# finishes last silently overwrites the other's pending_upload.json.
# cancel-in-progress: false queues the new run instead of killing a
# live review in progress.
concurrency:
  group: ch4-upload
  cancel-in-progress: false

jobs:
  upload:
    runs-on: ubuntu-latest
    # FIX: was 60 minutes — too tight now that the growth engine sprint
    # actually blocks (see archive_pipeline.py fix) rather than
    # firing-and-forgetting. Sprint alone can take up to ~40 minutes
    # (30min wait + comment-engine work); video upload itself needs
    # headroom on top of that.
    timeout-minutes: 90
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg -qq
          pip install requests pillow -q

      - name: Pull latest state
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Actions"
          git pull --rebase origin main || true

      # ── FIX: pull back actual video/audio/thumbnail files from Generate ──
      - name: Download video artifact from latest Generate run
        uses: dawidd6/action-download-artifact@v6
        with:
          # FIX (found on deep re-audit — critical, total outage): this
          # was pointing at ch3_generate.yml, a copy-paste leftover from
          # Ch3's own upload workflow. ch3_generate.yml's runs only ever
          # produce an artifact named ch3-pending-video, never
          # ch4-pending-video, so this lookup could never find anything —
          # meaning Ch4 (The Archive) could never successfully publish a
          # single video, every run, unconditionally.
          workflow: ch4_generate.yml
          name: ch4-pending-video
          path: /tmp/archive
          # FIX (found on direct user report, July 15 2026): 'success'
          # meant this could only ever find an artifact from a Generate
          # run whose ENTIRE job reported success -- if literally
          # anything failed anywhere else in that run (even well after
          # the video was already safely rendered and uploaded as an
          # artifact), the whole job is marked failed and this lookup
          # finds nothing at all, permanently blocking Upload with no
          # real explanation beyond "video file missing". What actually
          # matters is whether the artifact exists, not the run's
          # overall verdict -- 'completed' matches the most recent
          # finished run (success OR failure) that has this artifact.
          workflow_conclusion: completed
          if_no_artifact_found: warn

      - name: Upload pre-generated video
        env:
          CHANNEL4_YT_CLIENT_ID:     ${{ secrets.CHANNEL4_YT_CLIENT_ID }}
          CHANNEL4_YT_CLIENT_SECRET: ${{ secrets.CHANNEL4_YT_CLIENT_SECRET }}
          CHANNEL4_YT_REFRESH_TOKEN: ${{ secrets.CHANNEL4_YT_REFRESH_TOKEN }}
          YOUTUBE_CLIENT_ID:         ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET:     ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN:     ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          TELEGRAM_TOKEN:            ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:          ${{ secrets.TELEGRAM_CHAT_ID }}
          # v5 addition: Ch4's own dedicated bot — the Shorts checkpoint
          # (recap short review) happens in this upload-phase workflow,
          # so it needs these here too, not just in ch3_generate.yml.
          TELEGRAM_TOKEN_CH4:        ${{ secrets.TELEGRAM_TOKEN_CH4 }}
          TELEGRAM_CHAT_ID_CH4:      ${{ secrets.TELEGRAM_CHAT_ID_CH4 }}
          # For the new post-upload revenue snapshot (post_upload_reporter.py) —
          # optional, degrades to an honest "not connected" line if unset.
          GUMROAD_ACCESS_TOKEN:      ${{ secrets.GUMROAD_ACCESS_TOKEN }}
          GMAIL_SENDER_EMAIL:        ${{ secrets.GMAIL_SENDER_EMAIL }}
          GMAIL_APP_PASSWORD:        ${{ secrets.GMAIL_APP_PASSWORD }}
          CEREBRAS_API_KEY:          ${{ secrets.CEREBRAS_API_KEY }}
          SAMBANOVA_API_KEY:         ${{ secrets.SAMBANOVA_API_KEY }}
          GEMINI_API_KEY:            ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY_2:          ${{ secrets.GEMINI_API_KEY_2 }}
          GROQ_API_KEY:              ${{ secrets.GROQ_API_KEY }}
          COHERE_API_KEY:            ${{ secrets.COHERE_API_KEY }}
          MISTRAL_API_KEY:           ${{ secrets.MISTRAL_API_KEY }}
          OPENROUTER_API_KEY:        ${{ secrets.OPENROUTER_API_KEY }}
          PIXABAY_KEY:               ${{ secrets.PIXABAY_KEY }}
          PEXELS_API_KEY:            ${{ secrets.PEXELS_API_KEY }}
          # Optional — enables real trending-topic lookup for standalone
          # Shorts via NewsAPI (newsapi.org, free tier). Already correctly
          # gated in shorts_reels_engine.py (skips gracefully if unset) —
          # found via sequential re-audit that this was never passed
          # through even though the code was ready for it.
          NEWS_API_KEY:              ${{ secrets.NEWS_API_KEY }}
          FISH_AUDIO_API_KEY:        ${{ secrets.FISH_AUDIO_API_KEY }}
          PIPELINE_PHASE:            "upload"
        run: |
          # FIX: PYTHONPATH previously only added "channels" — never
          # "video_pipeline", where phase_manager.py, thumbnail_engine_v2.py,
          # shorts_reels_engine.py, growth_engine.py, authenticity_guard.py,
          # daily_audit_engine.py, publishing_archive.py, product_manuscript.py,
          # topic_scoring.py, and site_generator.py all actually live. Every
          # one of this session's new integrations depends on this being fixed.
          export PYTHONPATH="${PYTHONPATH}:$(pwd)/channels:$(pwd)/video_pipeline"
          python -u channels/archive/archive_pipeline.py

      - name: Commit upload state
        if: always()
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Actions"
          # FIX: one git add per file. Previously all paths were in a single
          # git add command — if ANY one file didn't exist (e.g. next_week_strategy.json
          # only gets created on certain episodes), git aborted the WHOLE add as fatal,
          # silently swallowed by the old "|| true", and NOTHING got staged — not even
          # files that did exist. This is why pushes looked successful but saved nothing.
          git add channels/archive/state.json || true
          git add channels/archive/intel.json || true
          git add channels/archive/pending_upload.json || true
          # FIX (critical, found on workflow audit): series_progress.json
          # is written by advance_series_progress() HERE, at confirmed-
          # publish time — without this git-add, the actual Part N -> N+1
          # advancement would never be saved at all.
          git add channels/archive/series_progress.json || true
          # CRITICAL FIX (found on final re-audit): every one of these 4
          # files is written during the confirmed-publish step of THIS
          # workflow (daily_audit_engine.py, publishing_archive.py,
          # authenticity_guard.py, topic_scoring.py) but NONE were ever
          # in this commit step — meaning the entire audit history,
          # publishing archive, authenticity fingerprint baseline, and
          # topic backlog would have been silently wiped by the ephemeral
          # runner after every single run, resetting to zero every day
          # despite appearing to work correctly within any one run.
          git add channels/archive/audit_index.json || true
          git add channels/archive/publishing_archive.json || true
          git add channels/archive/fingerprint_history.json || true
          git add channels/archive/topic_database.json || true
          # CRITICAL FIX (found on most advanced re-audit): same gap as
          # ch3_generate.yml — review_queue.json was never committed here
          # either. This phase both reads it (to review the recap Short
          # with the real, already-accumulated check-in count) and
          # ultimately deletes it via clear_queue() once the episode's
          # review is fully resolved — `git add` on a since-deleted,
          # previously-tracked file correctly stages that deletion too,
          # so the queue genuinely frees up for the next episode instead
          # of silently never having existed from git's perspective.
          git add channels/archive/review_queue.json || true
          # FIX (found on deep re-audit): attach_video_id/record_format_ctr
          # (video_pipeline/thumbnail_formats.py) both run during the
          # UPLOAD phase, updating thumb_format_history.json — but only
          # generate.yml git-added it. Any update made here, on a
          # separate runner, was never actually committed.
          git add channels/archive/thumb_format_history.json || true
          git add channels/archive/shorts_format_history.json || true
          # CRITICAL FIX: render_companion_page() writes a new page to
          # docs/controlfiles/ep{N}.html during this same confirmed-publish
          # step — without committing docs/ here, every companion page
          # would vanish the moment this runner terminates, and the
          # weekly site-navigation job (which only links to *existing*
          # pages, it doesn't regenerate them) would have nothing to link to.
          git add docs/ || true
          # CRITICAL FIX: add_product_note() also runs at this same
          # confirmed-publish step, appending to the shared product
          # manuscript — without committing products/ here (not just in
          # the separate weekly job), every note added between one Sunday
          # and the next would be lost.
          git add products/ || true
          git diff --staged --quiet || git commit -m "chore: ch4 uploaded [skip ci]"
          # FIX: retry push instead of silently dropping it on conflict.
          # "|| true" alone meant a failed push (e.g. two workflows landing
          # near the same time) was swallowed with zero indication — the
          # commit would exist locally on that dead runner and nowhere else.
          for i in 1 2 3 4 5; do
            if git push origin main; then
              echo "Push succeeded on attempt $i"
              break
            fi
            echo "Push failed (attempt $i) — pulling + retrying in $((i*5))s"
            sleep $((i*5))
            git pull --rebase origin main || true
            if [ "$i" = "5" ]; then
              echo "::error::Push failed after 5 attempts — commit did NOT reach GitHub"
              exit 1
            fi
          done
