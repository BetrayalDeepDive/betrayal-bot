name: Ch4 The Archive — Upload

on:
  schedule:
    # Runs at 10:00 PM IST (4:30 PM UTC)
    - cron: '30 16 * * *'
  workflow_dispatch:

jobs:
  upload:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests google-auth-oauthlib \
                      google-auth-httplib2 google-api-python-client 2>/dev/null || true

      - name: Pull latest state
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Actions"
          git pull origin main --rebase || true

      - name: Upload pre-generated video
        env:
          PIPELINE_PHASE: upload
          WORK_DIR: /tmp/archive
          ARCHIVE_YT_CLIENT_ID: ${{ secrets.ARCHIVE_YT_CLIENT_ID }}
          ARCHIVE_YT_CLIENT_SECRET: ${{ secrets.ARCHIVE_YT_CLIENT_SECRET }}
          ARCHIVE_YT_REFRESH_TOKEN: ${{ secrets.ARCHIVE_YT_REFRESH_TOKEN }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          export PYTHONPATH="${PYTHONPATH}:$(pwd)/channels"
          mkdir -p /tmp/archive
          cp channels/archive/pending_upload.json /tmp/archive/ 2>/dev/null || true
          cp channels/archive/archive_state.json  /tmp/archive/ 2>/dev/null || true
          python channels/archive/archive_pipeline.py

      - name: Commit state
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Actions"
          cp /tmp/archive/archive_state.json channels/archive/archive_state.json 2>/dev/null || true
          git add -A
          git diff --staged --quiet || git commit -m "Ch4 Archive: uploaded $(date '+%Y-%m-%d')"
          git push origin main || true

      - name: Post Run
        uses: actions/setup-python@v5
        if: always()
        with:
          python-version: '3.11'
