name: DeepDive Content Publisher

on:
  schedule:
    # 8:00 AM IST = 2:30 AM UTC daily
    - cron: '30 2 * * *'
  workflow_dispatch:  # Manual trigger for testing

jobs:
  publish_content:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install groq requests

      - name: Run Content Publisher
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          DEVTO_API_KEY: ${{ secrets.DEVTO_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python content_publisher.py

      - name: Upload Medium article as artifact
        uses: actions/upload-artifact@v4
        with:
          name: medium-article-${{ github.run_number }}
          path: medium_article_*.md
          retention-days: 30
