name: Betrayal DeepDive — YouTube Automation

# ─────────────────────────────────────────────────────────────
# STORAGE-SAFE DESIGN:
# - Zero artifact uploads (videos go direct to YouTube/Drive)
# - Aggressive cleanup after every step
# - No cache steps (nothing persists between runs)
# - All temp files deleted before job ends
# This means ZERO GitHub storage used. Runs forever free.
# ─────────────────────────────────────────────────────────────

on:
  workflow_dispatch:

jobs:
  run-automation:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      GROQ_API_KEY:          ${{ secrets.GROQ_API_KEY }}
      PIXABAY_KEY:           ${{ secrets.PIXABAY_KEY }}
      TELEGRAM_TOKEN:        ${{ secrets.TELEGRAM_TOKEN }}
      TELEGRAM_CHAT_ID:      ${{ secrets.TELEGRAM_CHAT_ID }}
      YOUTUBE_CLIENT_ID:     ${{ secrets.YOUTUBE_CLIENT_ID }}
      YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
      YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
      NEWS_API_KEY:          ${{ secrets.NEWS_API_KEY }}
      YOUTUBE_DATA_API_KEY:  ${{ secrets.YOUTUBE_DATA_API_KEY }}
      GEMINI_API_KEY:        ${{ secrets.GEMINI_API_KEY }}
      GOOGLE_SHEETS_CREDS:   ${{ secrets.GOOGLE_SHEETS_CREDS }}
      SHEETS_ID:             ${{ secrets.SHEETS_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          df -h

      - name: Install FFmpeg and fonts
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg fonts-dejavu-core libass-dev

      - name: Install packages
        run: |
          pip install requests google-auth google-auth-oauthlib \
            google-api-python-client gspread oauth2client Pillow

      - name: Run video automation
        run: python video_server.py

      - name: Cleanup ALL temp files
        if: always()
        run: |
          rm -rf /tmp/betrayal_output/ || true
          rm -rf /tmp/*.mp4 /tmp/*.mp3 /tmp/*.wav || true
          rm -rf output/ || true
          df -h
