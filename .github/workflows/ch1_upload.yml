# ============================================================
# BETRAYAL DEEPDIVE — Ch1 Upload Workflow
# Phase 2: UPLOAD only (reads from pending_upload.json)
# Runs: Tue-Sat 10:30 PM IST = 17:00 UTC
# Uploads video generated by previous night's generate run
# ============================================================
name: Ch1 BetrayalDeepDive — Upload

on:
  schedule:
    - cron: '0 17 * * 2-6'   # 10:30 PM IST | Tue-Sat (day after generate)
  workflow_dispatch:

env:
  PYTHONUNBUFFERED: "1"
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: "true"
  PHASE: "upload"

jobs:
  upload:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pillow -q

      - name: Pull latest state
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Actions"
          git pull --rebase origin main || true

      - name: Upload pre-generated video
        env:
          YOUTUBE_CLIENT_ID:     ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          TELEGRAM_TOKEN:        ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:      ${{ secrets.TELEGRAM_CHAT_ID }}
          GMAIL_APP_PASSWORD:    ${{ secrets.GMAIL_APP_PASSWORD }}
          PIPELINE_PHASE:        "upload"
        run: |
          export PYTHONPATH="${PYTHONPATH}:$(pwd)/channels"
          python -u video_pipeline/master_pipeline.py

      - name: Commit upload state
        if: always()
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Actions"
          git add video_pipeline/state.json \
                  video_pipeline/pending_upload.json || true
          git diff --staged --quiet || git commit -m "chore: ch1 uploaded [skip ci]"
          git push origin main || true
