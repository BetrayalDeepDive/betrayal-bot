# ============================================================
# BETRAYAL DEEPDIVE — Ch1 Upload Workflow
# Phase 2: UPLOAD only (reads pending_upload.json from repo)
# Runs: Tue-Sat 10:30 PM IST = 17:00 UTC
# Uploads the video generated by previous night's generate run
# Also posts pinned comment, creates Shorts, runs growth sprint
# ============================================================
name: Ch1 BetrayalDeepDive — Upload

on:
  schedule:
    - cron: '0 17 * * 2-6'   # 10:30 PM IST | Tue-Sat
  workflow_dispatch:

env:
  PYTHONUNBUFFERED: "1"
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: "true"
  PHASE: "upload"

jobs:
  upload:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg -qq
          pip install requests pillow jinja2 reportlab -q

      - name: Pull latest state
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Actions"
          git pull --rebase origin main || true

      # ── FIX: pull back the actual video/audio/thumbnail files that ──
      # Generate rendered. Without this, pending_upload.json points to
      # /tmp/deepdive/final.mp4 which does not exist on this fresh runner.
      - name: Download video artifact from latest Generate run
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: ch1_generate.yml
          name: ch1-pending-video
          path: /tmp/deepdive
          workflow_conclusion: success
          if_no_artifact_found: fail

      - name: Upload pre-generated video
        env:
          YOUTUBE_CLIENT_ID:     ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          TELEGRAM_TOKEN:        ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:      ${{ secrets.TELEGRAM_CHAT_ID }}
          GMAIL_SENDER_EMAIL:    ${{ secrets.GMAIL_SENDER_EMAIL }}
          GMAIL_APP_PASSWORD:    ${{ secrets.GMAIL_APP_PASSWORD }}
          CEREBRAS_API_KEY:      ${{ secrets.CEREBRAS_API_KEY }}
          SAMBANOVA_API_KEY:     ${{ secrets.SAMBANOVA_API_KEY }}
          GEMINI_API_KEY:        ${{ secrets.GEMINI_API_KEY }}
          OPENROUTER_API_KEY:    ${{ secrets.OPENROUTER_API_KEY }}
          # FIX (found on full workflow audit, traced directly through
          # the actual code): ai_generate() — the full 7-provider chain —
          # genuinely gets called during the UPLOAD phase too (handling
          # EDIT feedback on the Title/Thumbnail/Description review
          # checkpoint). This workflow was missing 3 of those providers
          # entirely (Groq, Cohere, Mistral), reducing real resilience
          # exactly when a human's review feedback needs to be acted on.
          # Ch2's upload workflow already correctly had the full chain;
          # Ch1's did not.
          GEMINI_API_KEY_2:      ${{ secrets.GEMINI_API_KEY_2 }}
          GROQ_API_KEY:          ${{ secrets.GROQ_API_KEY }}
          COHERE_API_KEY:        ${{ secrets.COHERE_API_KEY }}
          MISTRAL_API_KEY:       ${{ secrets.MISTRAL_API_KEY }}
          PIXABAY_KEY:           ${{ secrets.PIXABAY_KEY }}
          # FIX: run_thumbnail_stage (called here during EDIT-feedback
          # thumbnail regeneration) falls back to Pexels if Pixabay fails
          # — was missing entirely from this workflow.
          PEXELS_API_KEY:        ${{ secrets.PEXELS_API_KEY }}
          PIPELINE_PHASE:        "upload"
        run: |
          export PYTHONPATH="${PYTHONPATH}:$(pwd)/channels"
          python -u video_pipeline/master_pipeline.py

      - name: Commit upload state
        if: always()
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Actions"
          # FIX: one git add per file. Previously all paths were in a single
          # git add command — if ANY one file didn't exist (e.g. next_week_strategy.json
          # only gets created on certain episodes), git aborted the WHOLE add as fatal,
          # silently swallowed by the old "|| true", and NOTHING got staged — not even
          # files that did exist. This is why pushes looked successful but saved nothing.
          git add video_pipeline/state.json || true
          git add video_pipeline/pending_upload.json || true
          # FIX: this is the workflow where the authenticity checker actually
          # writes fingerprint_history.json (after confirmed publish success,
          # in the upload phase) — without committing it here, every run's
          # comparison history is wiped on this ephemeral runner and the
          # structural-variation check would always see an empty history,
          # never actually detecting real repetition across episodes.
          git add video_pipeline/fingerprint_history.json || true
          # FIX: topic_database.json is ALSO written here (mark_produced,
          # after confirmed success) — needs committing from both phases,
          # same "check which phase actually writes it" lesson as before.
          git add video_pipeline/topic_database.json || true
          git add video_pipeline/publishing_archive.json || true
          # The unified audit search engine writes its index here, after
          # confirmed success — same persistence discipline as everything else.
          git add video_pipeline/audit_index.json || true
          # Companion pages only get generated here (need the real published
          # URL, which doesn't exist until upload succeeds) — this is the
          # ONLY workflow that ever writes to docs/.
          git add docs/ || true
          # Product manuscripts get extracted here too (after confirmed
          # success, using the real script content) — separate from docs/
          # since these are working drafts to be sold, not public pages.
          git add products/ || true
          git diff --staged --quiet || git commit -m "chore: ch1 uploaded [skip ci]"
          # FIX: retry push instead of silently dropping it on conflict.
          # "|| true" alone meant a failed push (e.g. two workflows landing
          # near the same time) was swallowed with zero indication — the
          # commit would exist locally on that dead runner and nowhere else.
          for i in 1 2 3 4 5; do
            if git push origin main; then
              echo "Push succeeded on attempt $i"
              break
            fi
            echo "Push failed (attempt $i) — pulling + retrying in $((i*5))s"
            sleep $((i*5))
            git pull --rebase origin main || true
            if [ "$i" = "5" ]; then
              echo "::error::Push failed after 5 attempts — commit did NOT reach GitHub"
            fi
          done
