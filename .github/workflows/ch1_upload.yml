# ============================================================
# BETRAYAL DEEPDIVE — Ch1 Upload Workflow
# Phase 2: UPLOAD only (reads pending_upload.json from repo)
# Runs: Tue-Sat 10:30 PM IST = 17:00 UTC
# US: 1 PM ET | UK: 6 PM BST — 1h before UK evening peak, indexed
# ahead of the later US evening peak
# Uploads the video generated by previous night's generate run
# Also posts pinned comment, creates Shorts, runs growth sprint
# ============================================================
name: Ch1 BetrayalDeepDive — Upload

on:
  schedule:
    - cron: '0 17 * * 2-6'   # 10:30 PM IST | Tue-Sat
  workflow_dispatch:

env:
  PYTHONUNBUFFERED: "1"
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: "true"
  PHASE: "upload"

# FIX (found on deep re-audit): no concurrency guard existed on any
# of the 10 workflows -- a manual workflow_dispatch/is_makeup re-run
# while a previous run for this same channel+phase is still polling
# Telegram for a review decision could run two full pipeline
# processes in parallel: duplicate script generation burning real AI
# provider quota, two review conversations landing in the same
# Telegram chat at once, and a git-push race where whichever process
# finishes last silently overwrites the other's pending_upload.json.
# cancel-in-progress: false queues the new run instead of killing a
# live review in progress.
concurrency:
  group: ch1-upload
  cancel-in-progress: false

jobs:
  upload:
    runs-on: ubuntu-latest
    # FIX (found on deep re-audit): the post-upload sprint's growth-engine
    # call is now a blocking subprocess.run (up to 40 min) on top of its
    # own internal 30-min sleep before the comment-reply engine — 60 min
    # total job budget was too tight, matching the 90-min bump already
    # applied to ch3/ch4/ch5_upload.yml for the same reason.
    timeout-minutes: 90
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg -qq
          pip install requests pillow jinja2 reportlab -q

      - name: Pull latest state
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Actions"
          git pull --rebase origin main || true

      # ── FIX: pull back the actual video/audio/thumbnail files that ──
      # Generate rendered. Without this, pending_upload.json points to
      # /tmp/deepdive/final.mp4 which does not exist on this fresh runner.
      - name: Download video artifact from latest Generate run
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: ch1_generate.yml
          name: ch1-pending-video
          path: /tmp/deepdive
          # FIX (found on direct user report, July 15 2026): 'success'
          # meant this could only ever find an artifact from a Generate
          # run whose ENTIRE job reported success -- if literally
          # anything failed anywhere else in that run (even well after
          # the video was already safely rendered and uploaded as an
          # artifact), the whole job is marked failed and this lookup
          # finds nothing at all, permanently blocking Upload with no
          # real explanation beyond "video file missing". What actually
          # matters is whether the artifact exists, not the run's
          # overall verdict -- 'completed' matches the most recent
          # finished run (success OR failure) that has this artifact.
          workflow_conclusion: completed
          if_no_artifact_found: warn

      - name: Upload pre-generated video
        env:
          YOUTUBE_CLIENT_ID:     ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          TELEGRAM_TOKEN:        ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:      ${{ secrets.TELEGRAM_CHAT_ID }}
          # For the new post-upload revenue snapshot (post_upload_reporter.py) —
          # optional, degrades to an honest "not connected" line if unset.
          GUMROAD_ACCESS_TOKEN:  ${{ secrets.GUMROAD_ACCESS_TOKEN }}
          GMAIL_SENDER_EMAIL:    ${{ secrets.GMAIL_SENDER_EMAIL }}
          GMAIL_APP_PASSWORD:    ${{ secrets.GMAIL_APP_PASSWORD }}
          CEREBRAS_API_KEY:      ${{ secrets.CEREBRAS_API_KEY }}
          SAMBANOVA_API_KEY:     ${{ secrets.SAMBANOVA_API_KEY }}
          GEMINI_API_KEY:        ${{ secrets.GEMINI_API_KEY }}
          OPENROUTER_API_KEY:    ${{ secrets.OPENROUTER_API_KEY }}
          # FIX (found on full workflow audit, traced directly through
          # the actual code): ai_generate() — the full 7-provider chain —
          # genuinely gets called during the UPLOAD phase too (handling
          # EDIT feedback on the Title/Thumbnail/Description review
          # checkpoint). This workflow was missing 3 of those providers
          # entirely (Groq, Cohere, Mistral), reducing real resilience
          # exactly when a human's review feedback needs to be acted on.
          # Ch2's upload workflow already correctly had the full chain;
          # Ch1's did not.
          GEMINI_API_KEY_2:      ${{ secrets.GEMINI_API_KEY_2 }}
          GROQ_API_KEY:          ${{ secrets.GROQ_API_KEY }}
          COHERE_API_KEY:        ${{ secrets.COHERE_API_KEY }}
          MISTRAL_API_KEY:       ${{ secrets.MISTRAL_API_KEY }}
          PIXABAY_KEY:           ${{ secrets.PIXABAY_KEY }}
          # FIX: run_thumbnail_stage (called here during EDIT-feedback
          # thumbnail regeneration) falls back to Pexels if Pixabay fails
          # — was missing entirely from this workflow.
          PEXELS_API_KEY:        ${{ secrets.PEXELS_API_KEY }}
          PIPELINE_PHASE:        "upload"
        run: |
          export PYTHONPATH="${PYTHONPATH}:$(pwd)/channels:$(pwd)/video_pipeline"
          python -u channels/betrayal_deepdive/master_pipeline.py

      - name: Commit upload state
        if: always()
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Actions"
          # FIX: one git add per file. Previously all paths were in a single
          # git add command — if ANY one file didn't exist (e.g. next_week_strategy.json
          # only gets created on certain episodes), git aborted the WHOLE add as fatal,
          # silently swallowed by the old "|| true", and NOTHING got staged — not even
          # files that did exist. This is why pushes looked successful but saved nothing.
          git add channels/betrayal_deepdive/state.json || true
          git add channels/betrayal_deepdive/pending_upload.json || true
          # FIX: this is the workflow where the authenticity checker actually
          # writes fingerprint_history.json (after confirmed publish success,
          # in the upload phase) — without committing it here, every run's
          # comparison history is wiped on this ephemeral runner and the
          # structural-variation check would always see an empty history,
          # never actually detecting real repetition across episodes.
          git add channels/betrayal_deepdive/fingerprint_history.json || true
          # FIX: topic_database.json is ALSO written here (mark_produced,
          # after confirmed success) — needs committing from both phases,
          # same "check which phase actually writes it" lesson as before.
          git add channels/betrayal_deepdive/topic_database.json || true
          git add channels/betrayal_deepdive/publishing_archive.json || true
          # The unified audit search engine writes its index here, after
          # confirmed success — same persistence discipline as everything else.
          git add channels/betrayal_deepdive/audit_index.json || true
          # FIX (found on deep re-audit): attach_video_id/record_format_ctr
          # (video_pipeline/thumbnail_formats.py) both run during the
          # UPLOAD phase, updating thumb_format_history.json — but only
          # generate.yml git-added it. Any update made here, on a
          # separate runner, was never actually committed.
          git add channels/betrayal_deepdive/thumb_format_history.json || true
          git add channels/betrayal_deepdive/shorts_format_history.json || true
          # Companion pages only get generated here (need the real published
          # URL, which doesn't exist until upload succeeds) — this is the
          # ONLY workflow that ever writes to docs/.
          git add docs/ || true
          # Product manuscripts get extracted here too (after confirmed
          # success, using the real script content) — separate from docs/
          # since these are working drafts to be sold, not public pages.
          git add products/ || true
          git diff --staged --quiet || git commit -m "chore: ch1 uploaded [skip ci]"
          # FIX: retry push instead of silently dropping it on conflict.
          # "|| true" alone meant a failed push (e.g. two workflows landing
          # near the same time) was swallowed with zero indication — the
          # commit would exist locally on that dead runner and nowhere else.
          for i in 1 2 3 4 5; do
            if git push origin main; then
              echo "Push succeeded on attempt $i"
              break
            fi
            echo "Push failed (attempt $i) — pulling + retrying in $((i*5))s"
            sleep $((i*5))
            git pull --rebase origin main || true
            if [ "$i" = "5" ]; then
              echo "::error::Push failed after 5 attempts — commit did NOT reach GitHub"
              exit 1
            fi
          done
