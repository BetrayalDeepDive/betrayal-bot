# ============================================================
# THE EVIDENCE ROOM — Ch2 Generation Workflow
# Phase 1: GENERATE only (no upload)
# Runs: Mon-Fri 12:30 AM IST = 19:00 UTC (3.5h after Ch1 generate)
# Token quota gap: 3.5 hours ensures Cerebras/Gemini quotas recovered
# Niches: Forensic Finance, Criminal Investigation, Corporate Exposure,
#         Digital Forensics, Body Cam, Courtroom Drama, Robbery Docs
# Features: 13-attempt engine, SSML audio, stage-matched video,
#           3-variant cold open, pattern memory, 4 Shorts/day (2 on-topic +
#           2 real-trend-researched, teaser/recap removed per explicit request)
# ============================================================
name: Ch2 Evidence Room — Generate

on:
  schedule:
    - cron: '0 19 * * 1-5'   # 12:30 AM IST | Mon-Fri
  workflow_dispatch:
    inputs:
      is_makeup:
        description: 'Resume from checkpoint'
        required: false
        default: 'false'
        type: choice
        options: ['false','true']

env:
  PYTHONUNBUFFERED: "1"
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: "true"
  PHASE: "generate"

# FIX (found on deep re-audit): no concurrency guard existed on any
# of the 10 workflows -- a manual workflow_dispatch/is_makeup re-run
# while a previous run for this same channel+phase is still polling
# Telegram for a review decision could run two full pipeline
# processes in parallel: duplicate script generation burning real AI
# provider quota, two review conversations landing in the same
# Telegram chat at once, and a git-push race where whichever process
# finishes last silently overwrites the other's pending_upload.json.
# cancel-in-progress: false queues the new run instead of killing a
# live review in progress.
concurrency:
  group: ch2-generate
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg fonts-dejavu-core fonts-liberation espeak-ng -qq
          pip install requests pillow edge-tts gTTS -q
          # Kokoro (local TTS, genuinely natural-sounding, no rate limit) —
          # CPU-only torch wheel avoids unnecessary CUDA packages.
          # espeak-ng is already installed above (a Kokoro dependency).
          pip install --index-url https://download.pytorch.org/whl/cpu torch -q
          pip install kokoro soundfile -q

      - name: Pull latest state
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Actions"
          git pull --rebase origin main || true

      - name: Generate video (no upload)
        env:
          CEREBRAS_API_KEY:          ${{ secrets.CEREBRAS_API_KEY }}
          SAMBANOVA_API_KEY:         ${{ secrets.SAMBANOVA_API_KEY }}
          GEMINI_API_KEY:            ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY_2:          ${{ secrets.GEMINI_API_KEY_2 }}
          GROQ_API_KEY:              ${{ secrets.GROQ_API_KEY }}
          OPENROUTER_API_KEY:        ${{ secrets.OPENROUTER_API_KEY }}
          COHERE_API_KEY:            ${{ secrets.COHERE_API_KEY }}
          MISTRAL_API_KEY:           ${{ secrets.MISTRAL_API_KEY }}
          PIXABAY_KEY:               ${{ secrets.PIXABAY_KEY }}
          PEXELS_API_KEY:            ${{ secrets.PEXELS_API_KEY }}
          # FIX (found on full workflow audit, matching Ch3/Ch4's
          # workflows): NEWS_API_KEY is used by shorts_reels_engine.py's
          # real trend-research feature — was missing here entirely.
          NEWS_API_KEY:              ${{ secrets.NEWS_API_KEY }}
          # FIX: this was genuinely using secrets.TELEGRAM_TOKEN (Ch1's
          # original bot) — meaning every Ch2 review would have landed
          # in Ch1's chat, completely defeating the whole separate-bot-
          # per-channel design the project owner specifically set up.
          #
          # FIX (found on full workflow audit, robustness improvement):
          # this only ever set the env var named "TELEGRAM_TOKEN" to the
          # CH2 secret's value — the .py code's real primary lookup is
          # literally named env var "TELEGRAM_TOKEN_CH2", with
          # "TELEGRAM_TOKEN" only as its fallback. The old setup worked,
          # but only by relying on that fallback chain rather than the
          # code's actual intended primary path — fragile if that lookup
          # order is ever changed. Now sets both explicitly.
          TELEGRAM_TOKEN_CH2:        ${{ secrets.TELEGRAM_TOKEN_CH2 }}
          TELEGRAM_TOKEN:            ${{ secrets.TELEGRAM_TOKEN_CH2 }}
          FISH_AUDIO_API_KEY:    ${{ secrets.FISH_AUDIO_API_KEY }}  # optional TTS backup — leave secret empty/unset if not using it
          # FIX: same real issue as the token — each bot conversation has
          # its own distinct chat ID, even talking to it from the same
          # Telegram account, so this needs its own secret too.
          TELEGRAM_CHAT_ID_CH2:      ${{ secrets.TELEGRAM_CHAT_ID_CH2 }}
          # For Shorts' post-upload revenue snapshot (post_upload_reporter.py) —
          # Shorts upload during the generate phase, not the upload phase.
          GUMROAD_ACCESS_TOKEN:      ${{ secrets.GUMROAD_ACCESS_TOKEN }}
          TELEGRAM_CHAT_ID:          ${{ secrets.TELEGRAM_CHAT_ID_CH2 }}
          GMAIL_SENDER_EMAIL:        ${{ secrets.GMAIL_SENDER_EMAIL }}
          GMAIL_APP_PASSWORD:        ${{ secrets.GMAIL_APP_PASSWORD }}
          EVIDENCE_YT_CLIENT_ID:     ${{ secrets.EVIDENCE_YT_CLIENT_ID }}
          EVIDENCE_YT_CLIENT_SECRET: ${{ secrets.EVIDENCE_YT_CLIENT_SECRET }}
          EVIDENCE_YT_REFRESH_TOKEN: ${{ secrets.EVIDENCE_YT_REFRESH_TOKEN }}
          YOUTUBE_CLIENT_ID:         ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET:     ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN:     ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          PIPELINE_PHASE:            "generate"
          IS_MAKEUP:                 ${{ github.event.inputs.is_makeup || 'false' }}
        run: |
          # FIX (critical, found while verifying the new authenticity_guard
          # integration): video_pipeline/ — where phase_manager.py,
          # thumbnail_engine_v2.py, shorts_reels_engine.py, growth_engine.py,
          # and authenticity_guard.py all actually live — was NEVER on the
          # Python path here, only channels/ was. main()'s phase_manager
          # import has NO error handling around it at all — if this path was
          # genuinely missing in the real repo, evidence_room_pipeline.py's
          # main() would crash immediately with ModuleNotFoundError on every
          # single run, both generate and upload, before any pipeline logic
          # ever executes. Verified this precisely by simulating the exact
          # real import scenario, not guessed. Fixed by adding video_pipeline/
          # to the path alongside channels/.
          export PYTHONPATH="${PYTHONPATH}:$(pwd)/channels:$(pwd)/video_pipeline"
          python -u channels/evidence_room/evidence_room_pipeline.py

      # ── FIX: persist rendered video/audio/thumbnail across runners ──
      - name: Upload video artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ch2-pending-video
          # FIX (same root cause confirmed live on Ch1, run 30082874147):
          # uploading the entire work dir risked a multi-GB artifact once a
          # run actually got through video assembly (raw.mp4, per-scene
          # encodes, etc.), which crashes the download step's ~4GiB Node.js
          # buffer limit. The upload phase only ever reads
          # pending["video_path"] (final*.mp4) and pending["thumbnail_path"]
          # (thumbnail.jpg) -- audio and Shorts clips are never read back.
          path: |
            /tmp/evidence_room/final*.mp4
            /tmp/evidence_room/thumbnail*
          retention-days: 2
          if-no-files-found: warn

      - name: Commit generated artifacts + state
        if: always()
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Actions"
          # FIX: one git add per file. Previously all paths were in a single
          # git add command — if ANY one file didn't exist (e.g. next_week_strategy.json
          # only gets created on certain episodes), git aborted the WHOLE add as fatal,
          # silently swallowed by the old "|| true", and NOTHING got staged — not even
          # files that did exist. This is why pushes looked successful but saved nothing.
          git add channels/evidence_room/state.json || true
          git add channels/evidence_room/intel.json || true
          git add channels/evidence_room/pending_upload.json || true
          # FIX: same gap found and fixed for Ch1 — without committing this,
          # the avatar cache is silently lost on this ephemeral runner every
          # single run, defeating the purpose of caching it at all.
          git add channels/evidence_room/avatar_cache/ || true
          # FIX: same pattern as Ch1 — topic_database.json gets written
          # here too (add_topic_candidate scores fresh candidates during generate)
          git add channels/evidence_room/topic_database.json || true
          # FIX: thumb_format_history.json / shorts_format_history.json
          # (real, appended-to learning history for the 11-format
          # thumbnail library and Shorts format-variety rotation) were
          # never explicitly added — same "ephemeral runner, nothing
          # persists unless committed" bug already fixed for every other
          # state file above.
          git add channels/evidence_room/thumb_format_history.json || true
          git add channels/evidence_room/shorts_format_history.json || true
          git diff --staged --quiet || git commit -m "chore: ch2 generated [skip ci]"
          # FIX: retry push instead of silently dropping it on conflict.
          # "|| true" alone meant a failed push (e.g. two workflows landing
          # near the same time) was swallowed with zero indication — the
          # commit would exist locally on that dead runner and nowhere else.
          for i in 1 2 3 4 5; do
            if git push origin main; then
              echo "Push succeeded on attempt $i"
              break
            fi
            echo "Push failed (attempt $i) — pulling + retrying in $((i*5))s"
            sleep $((i*5))
            git pull --rebase origin main || true
            if [ "$i" = "5" ]; then
              echo "::error::Push failed after 5 attempts — commit did NOT reach GitHub"
              exit 1
            fi
          done
