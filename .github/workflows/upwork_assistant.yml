name: Upwork Assistant

on:
  # PAUSED (2026-07-24, explicit user request): all automations disabled
  # while outstanding Ch1-5 pipeline bugs are being found and fixed.
  # workflow_dispatch below still works for manual runs. Re-enable by
  # uncommenting the schedule block once fixes are confirmed.
  # schedule:
  #   - cron: '0 4 * * *'   # 9:30 AM IST daily — checks for new Upwork job-alert emails
  workflow_dispatch:

env:
  PYTHONUNBUFFERED: "1"

jobs:
  check-upwork-jobs:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests --break-system-packages -q

      - name: Run Upwork Assistant
        working-directory: video_pipeline
        env:
          GROQ_API_KEY:        ${{ secrets.GROQ_API_KEY }}
          GMAIL_USER:          ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD:  ${{ secrets.GMAIL_APP_PASSWORD }}
          TELEGRAM_TOKEN:      ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:    ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python -u upwork_assistant.py || echo "Non-fatal — check logs above"
