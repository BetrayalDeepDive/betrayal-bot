name: DeepDive Empire — Growth Engine

on:
  schedule:
    # Weekly cycle: Sunday 11:00 AM IST = 5:30 AM UTC
    - cron: '30 5 * * 0'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode: weekly or sprint'
        required: false
        default: 'weekly'
        type: choice
        options: ['weekly', 'sprint']
      sprint_video_url:
        description: 'Video URL (sprint mode only)'
        required: false
        default: ''
      sprint_channel_id:
        description: 'Channel ID (sprint mode only)'
        required: false
        default: 'betrayal_deepdive'
        type: choice
        options: ['betrayal_deepdive', 'evidence_room', 'control_files']

env:
  PYTHONUNBUFFERED: "1"
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: "true"

jobs:
  growth-engine:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests pillow -q

      - name: Pull latest state
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Actions"
          git pull --rebase origin main || true

      - name: Run Growth Engine
        env:
          # All AI providers
          CEREBRAS_API_KEY:          ${{ secrets.CEREBRAS_API_KEY }}
          SAMBANOVA_API_KEY:         ${{ secrets.SAMBANOVA_API_KEY }}
          GEMINI_API_KEY:            ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY_2:          ${{ secrets.GEMINI_API_KEY_2 }}
          GROQ_API_KEY:              ${{ secrets.GROQ_API_KEY }}
          OPENROUTER_API_KEY:        ${{ secrets.OPENROUTER_API_KEY }}
          COHERE_API_KEY:            ${{ secrets.COHERE_API_KEY }}
          MISTRAL_API_KEY:           ${{ secrets.MISTRAL_API_KEY }}
          # All three channel OAuth
          YOUTUBE_CLIENT_ID:         ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET:     ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN:     ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          EVIDENCE_YT_CLIENT_ID:     ${{ secrets.EVIDENCE_YT_CLIENT_ID }}
          EVIDENCE_YT_CLIENT_SECRET: ${{ secrets.EVIDENCE_YT_CLIENT_SECRET }}
          EVIDENCE_YT_REFRESH_TOKEN: ${{ secrets.EVIDENCE_YT_REFRESH_TOKEN }}
          CHANNEL3_YT_CLIENT_ID:     ${{ secrets.CHANNEL3_YT_CLIENT_ID }}
          CHANNEL3_YT_CLIENT_SECRET: ${{ secrets.CHANNEL3_YT_CLIENT_SECRET }}
          CHANNEL3_YT_REFRESH_TOKEN: ${{ secrets.CHANNEL3_YT_REFRESH_TOKEN }}
          # Media keys
          PIXABAY_KEY:               ${{ secrets.PIXABAY_KEY }}
          # Notifications
          TELEGRAM_TOKEN:            ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:          ${{ secrets.TELEGRAM_CHAT_ID }}
          # Mode
          GROWTH_ENGINE_MODE:        ${{ github.event.inputs.mode || 'weekly' }}
          SPRINT_VIDEO_URL:          ${{ github.event.inputs.sprint_video_url || '' }}
          SPRINT_CHANNEL_ID:         ${{ github.event.inputs.sprint_channel_id || 'betrayal_deepdive' }}
        run: |
          python -u channels/growth_engine/growth_engine.py

      - name: Commit growth state
        if: always()
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Actions"
          git add channels/growth_engine/growth_state.json \
                  video_pipeline/next_week_strategy.json \
                  channels/evidence_room/next_week_strategy.json \
                  channels/control_files/next_week_strategy.json || true
          git diff --staged --quiet || git commit -m "chore: update growth state [skip ci]"
          git push origin main || true
