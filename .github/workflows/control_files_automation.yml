name: The Control Files — Channel 3 Automation v12.0

on:
  schedule:
    # Mon–Fri 1:30 PM IST = 8:00 AM UTC
    - cron: '0 8 * * 1-5'
  workflow_dispatch:
    inputs:
      is_makeup:
        description: 'Resume from checkpoint (true/false)'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

env:
  PYTHONUNBUFFERED: "1"
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: "true"  # suppress Node 20 cosmetic warning

jobs:
  make-video:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    permissions:
      contents: write   # needed to commit state.json back to repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg fonts-dejavu-core fonts-dejavu fonts-liberation imagemagick -qq

      - name: Install Python dependencies
        run: |
          pip install \
            requests \
            pillow \
            edge-tts \
            --break-system-packages -q

      - name: Pull latest state from repo (prevent stale state)
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Actions"
          git pull --rebase origin main || true

      - name: Run Control Files pipeline v12.0
        env:
          # AI Providers — 7-layer fallback chain
          CEREBRAS_API_KEY:          ${{ secrets.CEREBRAS_API_KEY }}
          SAMBANOVA_API_KEY:         ${{ secrets.SAMBANOVA_API_KEY }}
          GEMINI_API_KEY:            ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY_2:          ${{ secrets.GEMINI_API_KEY_2 }}
          GROQ_API_KEY:              ${{ secrets.GROQ_API_KEY }}
          OPENROUTER_API_KEY:        ${{ secrets.OPENROUTER_API_KEY }}
          COHERE_API_KEY:            ${{ secrets.COHERE_API_KEY }}
          MISTRAL_API_KEY:           ${{ secrets.MISTRAL_API_KEY }}

          # YouTube — Channel 3 credentials
          CHANNEL3_YT_CLIENT_ID:     ${{ secrets.CHANNEL3_YT_CLIENT_ID }}
          CHANNEL3_YT_CLIENT_SECRET: ${{ secrets.CHANNEL3_YT_CLIENT_SECRET }}
          CHANNEL3_YT_REFRESH_TOKEN: ${{ secrets.CHANNEL3_YT_REFRESH_TOKEN }}

          # Video/image sources
          PIXABAY_KEY:               ${{ secrets.PIXABAY_KEY }}
          PEXELS_API_KEY:            ${{ secrets.PEXELS_API_KEY }}

          # Notifications
          TELEGRAM_TOKEN:            ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:          ${{ secrets.TELEGRAM_CHAT_ID }}
          GMAIL_APP_PASSWORD:        ${{ secrets.GMAIL_APP_PASSWORD }}

          IS_MAKEUP:                 ${{ github.event.inputs.is_makeup || 'false' }}

        run: |
          python -u channels/control_files/control_files_pipeline.py

      - name: Commit updated state files
        if: always()
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Actions"
          git add channels/control_files/state.json channels/control_files/intel.json || true
          git diff --staged --quiet || git commit -m "chore: update ch3 state [skip ci]"
          git push origin main || true
