name: Blog Syndication

on:
  # PAUSED (2026-07-24, explicit user request): all automations disabled
  # while outstanding Ch1-5 pipeline bugs are being found and fixed.
  # workflow_dispatch below still works for manual runs. Re-enable by
  # uncommenting the schedule block once fixes are confirmed.
  # schedule:
  #   - cron: '0 8 * * *'   # 1:30 PM IST daily — runs a few hours after
                            # the channel upload workflows, so any real
                            # new episode has already published by then
  workflow_dispatch:

env:
  PYTHONUNBUFFERED: "1"

jobs:
  syndicate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write   # needed to commit the syndication tracking file back to the repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests --break-system-packages -q

      - name: Pull latest state (in case a channel just published)
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Actions"
          git pull --rebase origin main || true

      - name: Run blog syndication
        working-directory: video_pipeline
        env:
          GROQ_API_KEY:              ${{ secrets.GROQ_API_KEY }}
          DEVTO_API_KEY:             ${{ secrets.DEVTO_API_KEY }}
          HASHNODE_TOKEN:            ${{ secrets.HASHNODE_TOKEN }}
          HASHNODE_PUBLICATION_ID:   ${{ secrets.HASHNODE_PUBLICATION_ID }}
          TELEGRAM_TOKEN:            ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:          ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python -u run_syndication.py

      - name: Commit syndication tracking file
        if: always()
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Actions"
          git add video_pipeline/syndicated_episodes.json || true
          git diff --staged --quiet || git commit -m "chore: update syndication tracking [skip ci]"
          git push origin main || echo "nothing to push"
