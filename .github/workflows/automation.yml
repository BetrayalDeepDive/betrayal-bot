name: Betrayal DeepDive — YouTube Automation

on:
  schedule:
    # Mon/Wed/Fri at 8:00 AM IST = 2:30 AM UTC
    - cron: '30 2 * * 1,3,5'

    # Daily notification at 8:00 AM IST = 2:30 AM UTC (all days)
    - cron: '30 2 * * *'

    # Weekly report every Sunday at 9:00 AM IST = 3:30 AM UTC
    - cron: '30 3 * * 0'

  # Allow manual trigger from GitHub UI
  workflow_dispatch:
    inputs:
      topic:
        description: 'Custom video topic (optional)'
        required: false
        default: ''
      mode:
        description: 'Mode: produce / weekly_report / daily_notification'
        required: false
        default: 'produce'

jobs:
  run-automation:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install FFmpeg
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg
          ffmpeg -version | head -1

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Determine run mode
        id: mode
        run: |
          # Check what triggered this run
          EVENT="${{ github.event_name }}"
          DAY=$(date +%u)  # 1=Mon, 7=Sun
          HOUR_UTC=$(date +%H)
          MINUTE_UTC=$(date +%M)

          if [ "$EVENT" = "workflow_dispatch" ]; then
            echo "mode=${{ github.event.inputs.mode }}" >> $GITHUB_OUTPUT
            echo "topic=${{ github.event.inputs.topic }}" >> $GITHUB_OUTPUT
          elif [ "$DAY" = "7" ]; then
            echo "mode=weekly_report" >> $GITHUB_OUTPUT
            echo "topic=" >> $GITHUB_OUTPUT
          elif [ "$DAY" = "1" ] || [ "$DAY" = "3" ] || [ "$DAY" = "5" ]; then
            echo "mode=produce" >> $GITHUB_OUTPUT
            echo "topic=" >> $GITHUB_OUTPUT
          else:
            echo "mode=daily_notification" >> $GITHUB_OUTPUT
            echo "topic=" >> $GITHUB_OUTPUT
          fi

      - name: Run automation
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          PIXABAY_KEY: ${{ secrets.PIXABAY_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          MODE: ${{ steps.mode.outputs.mode }}
          TOPIC: ${{ steps.mode.outputs.topic }}
        run: python video_server.py

      - name: Upload artifacts (video files)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: video-output-${{ github.run_number }}
          path: /tmp/betrayal_output/
          retention-days: 7
          if-no-files-found: ignore
