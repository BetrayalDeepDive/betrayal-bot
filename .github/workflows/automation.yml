name: Betrayal DeepDive — YouTube Automation

on:
  schedule:
    - cron: '30 2 * * 1,3,5'
    - cron: '30 2 * * *'
    - cron: '30 3 * * 0'
  workflow_dispatch:
    inputs:
      topic:
        description: 'Custom video topic (optional)'
        required: false
        default: ''
      mode:
        description: 'Run mode: production / notification / report'
        required: false
        default: 'production'

env:
  GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
  PIXABAY_KEY: ${{ secrets.PIXABAY_KEY }}
  TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
  TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
  YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
  YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
  YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
  TOPIC: ${{ github.event.inputs.topic || '' }}
  RUN_MODE: ${{ github.event.inputs.mode || 'production' }}

jobs:
  run-automation:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg espeak-ng espeak-ng-data

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify espeak works
        run: |
          espeak-ng --version
          echo "espeak-ng ready"

      - name: Download Piper TTS voice model
        run: |
          pip install piper-tts
          wget -q "https://huggingface.co/rhasspy/piper-voices/resolve/main/en/en_US/ryan/high/en_US-ryan-high.onnx" -O en_US-ryan-high.onnx && echo "Piper model ready" || echo "Piper unavailable - espeak fallback active"
          wget -q "https://huggingface.co/rhasspy/piper-voices/resolve/main/en/en_US/ryan/high/en_US-ryan-high.onnx.json" -O en_US-ryan-high.onnx.json || true

      - name: Determine run mode
        run: echo "Run mode is $RUN_MODE"

      - name: Run automation
        run: python video_server.py

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: video-output
          path: /tmp/betrayal_output/
          retention-days: 3
          if-no-files-found: ignore
