• Revenue: *\${total_rev:.2f}* (₹{total_rev*83:,.0f})

💰 *COMBINED MONTHLY EST:*
• Total: *\${total_usd:,.0f}/month*
• In ₹: *₹{total_inr:,.0f}/month*
