name: Betrayal DeepDive — Full Empire Automation

on:
  workflow_dispatch:
  schedule:
    - cron: "23 23 * * *"
    - cron: "0 1 * * 1,3,5"
    - cron: "0 0 * * *"
    - cron: "30 8 * * *"
    - cron: "0 2 * * 0"
  workflow_dispatch:
    inputs:
      mode:
        description: "youtube | reels | report | test"
        required: false
        default: "youtube"

env:
  GROQ_API_KEY:          ${{ secrets.GROQ_API_KEY }}
  GEMINI_API_KEY:        ${{ secrets.GEMINI_API_KEY }}
  MISTRAL_API_KEY:       ${{ secrets.MISTRAL_API_KEY }}
  PIXABAY_KEY:           ${{ secrets.PIXABAY_KEY }}
  TELEGRAM_TOKEN:        ${{ secrets.TELEGRAM_TOKEN }}
  TELEGRAM_CHAT_ID:      ${{ secrets.TELEGRAM_CHAT_ID }}
  YOUTUBE_CLIENT_ID:     ${{ secrets.YOUTUBE_CLIENT_ID }}
  YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
  YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
  YOUTUBE_DATA_API_KEY:  ${{ secrets.YOUTUBE_DATA_API_KEY }}
  NEWS_API_KEY:          ${{ secrets.NEWS_API_KEY }}
  IG_USER_ID:            ${{ secrets.IG_USER_ID }}
  IG_ACCESS_TOKEN:       ${{ secrets.IG_ACCESS_TOKEN }}
  GOOGLE_SHEETS_CREDS:   ${{ secrets.GOOGLE_SHEETS_CREDS }}
  SHEETS_ID:             ${{ secrets.SHEETS_ID }}
  OUTPUT_DIR:            /tmp/empire_output

jobs:

  youtube-video:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    if: |
      github.event.schedule == '0 1 * * 1,3,5' ||
      github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Free disk space
        run: sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
      - name: Install packages
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg fonts-dejavu-core libass-dev espeak-ng
          pip install requests google-auth google-auth-oauthlib google-api-python-client gspread oauth2client Pillow
      - name: Run video automation
        run: python video_server.py
      - name: Cleanup
        if: always()
        run: rm -rf /tmp/empire_output/ /tmp/betrayal_output/ /tmp/*.mp4 /tmp/*.mp3 /tmp/*.wav || true

  daily-reels:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: |
      github.event.schedule == '0 0 * * *' ||
      github.event.schedule == '30 8 * * *'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Free disk space
        run: sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
      - name: Install packages
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg fonts-dejavu-core espeak-ng
          pip install requests Pillow
      - name: Run Reels
        run: python shorts_reels_engine.py reel_1
      - name: Cleanup
        if: always()
        run: rm -rf /tmp/shorts_output/ /tmp/empire_output/ || true

  intelligence-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event.schedule == '23 23 * * *'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install requests
      - name: Run intelligence scan
        run: python scripts/intelligence_engine.py || echo "Skipped"
      - name: Cleanup
        if: always()
        run: rm -rf /tmp/empire_output/ || true

  weekly-report:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event.schedule == '0 2 * * 0'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install requests gspread oauth2client google-auth
      - name: Send report
        run: python scripts/empire_report.py || echo "Skipped"
      - name: Cleanup
        if: always()
        run: rm -rf /tmp/empire_output/ || true
