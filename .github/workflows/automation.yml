name: 🏆 Betrayal DeepDive — Full Empire Automation v2

# ═══════════════════════════════════════════════════════════════
# COMPLETE EMPIRE PIPELINE:
# 1. YouTube long-form videos (Mon/Wed/Fri)
# 2. YouTube Shorts — 2 per video (teaser + recap)
# 3. Instagram Reels — 2 per day
# 4. Pinterest pins — 5 per day
# 5. Freelance order processing — every 30 min
# 6. Email support bot — every 30 min
# 7. Weekly financial report — every Sunday
#
# STORAGE: ZERO artifacts. Videos → YouTube direct. Deleted immediately.
# COST: $0. All free tiers. $0 GitHub budget set.
# UPTIME: Runs forever. Multi-API fallback (Groq→Gemini→Mistral).
# ═══════════════════════════════════════════════════════════════

on:
  schedule:
    - cron: "0 1 * * 1,3,5"    # YouTube video: Mon/Wed/Fri 6:30 AM IST
    - cron: "30 0 * * *"        # Instagram Reel 1: Daily 6 AM IST
    - cron: "30 8 * * *"        # Instagram Reel 2: Daily 2 PM IST
    - cron: "0 4 * * *"         # Pinterest pins: Daily 9:30 AM IST
    - cron: "*/30 * * * *"      # Orders + Support: Every 30 min
    - cron: "0 2 * * 0"         # Weekly report: Sunday 7:30 AM IST

  workflow_dispatch:
    inputs:
      mode:
        description: "Mode: youtube | shorts | reels | pinterest | orders | support | report | test"
        required: false
        default: "youtube"
      custom_topic:
        description: "Custom topic (optional)"
        required: false
        default: ""

# ═══════════════════════════════════════════════════════════════
# SHARED ENV — Available to all jobs
# ═══════════════════════════════════════════════════════════════
env:
  GROQ_API_KEY:          ${{ secrets.GROQ_API_KEY }}
  GEMINI_API_KEY:        ${{ secrets.GEMINI_API_KEY }}
  MISTRAL_API_KEY:       ${{ secrets.MISTRAL_API_KEY }}
  PIXABAY_KEY:           ${{ secrets.PIXABAY_KEY }}
  TELEGRAM_TOKEN:        ${{ secrets.TELEGRAM_TOKEN }}
  TELEGRAM_CHAT_ID:      ${{ secrets.TELEGRAM_CHAT_ID }}
  YOUTUBE_CLIENT_ID:     ${{ secrets.YOUTUBE_CLIENT_ID }}
  YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
  YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
  YOUTUBE_DATA_API_KEY:  ${{ secrets.YOUTUBE_DATA_API_KEY }}
  NEWS_API_KEY:          ${{ secrets.NEWS_API_KEY }}
  IG_USER_ID:            ${{ secrets.IG_USER_ID }}
  IG_ACCESS_TOKEN:       ${{ secrets.IG_ACCESS_TOKEN }}
  PINTEREST_ACCESS_TOKEN: ${{ secrets.PINTEREST_ACCESS_TOKEN }}
  PINTEREST_BOARD_ID:    ${{ secrets.PINTEREST_BOARD_ID }}
  GMAIL_SENDER_EMAIL:    ${{ secrets.GMAIL_SENDER_EMAIL }}
  GMAIL_APP_PASSWORD:    ${{ secrets.GMAIL_APP_PASSWORD }}
  GOOGLE_SHEETS_CREDS:   ${{ secrets.GOOGLE_SHEETS_CREDS }}
  SHEETS_ID:             ${{ secrets.SHEETS_ID }}
  GITHUB_TOKEN:          ${{ secrets.GITHUB_TOKEN }}
  GITHUB_REPOSITORY:     ${{ github.repository }}
  TOPIC_OVERRIDE:        ${{ github.event.inputs.custom_topic }}
  OUTPUT_DIR:            /tmp/empire_output

jobs:

  # ═══════════════════════════════════════════════════════════
  # JOB 1: YOUTUBE LONG-FORM VIDEO (Mon/Wed/Fri)
  # Runs video_server.py — full 14-17 min video
  # Pre-quality score → script → TTS → FFmpeg → upload → Telegram
  # ═══════════════════════════════════════════════════════════
  youtube-video:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    if: |
      github.event.schedule == '0 1 * * 1,3,5' ||
      (github.event_name == 'workflow_dispatch' && (
        github.event.inputs.mode == 'youtube' ||
        github.event.inputs.mode == 'test'
      ))

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}

      - name: Free disk space (gets 14GB free)
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          df -h

      - name: Install FFmpeg + fonts + audio tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg fonts-dejavu-core libass-dev espeak-ng

      - name: Install Python packages
        run: |
          pip install requests google-auth google-auth-oauthlib \
            google-api-python-client gspread oauth2client Pillow

      - name: Run video automation
        run: python video_server.py

      - name: Cleanup ALL temp files
        if: always()
        run: |
          rm -rf /tmp/empire_output/ /tmp/betrayal_output/ || true
          rm -f /tmp/*.mp4 /tmp/*.mp3 /tmp/*.wav /tmp/*.srt || true
          df -h

  # ═══════════════════════════════════════════════════════════
  # JOB 2: INSTAGRAM REELS (2x daily)
  # 9:16 vertical video — English + Hindi bilingual
  # Groq Orpheus voice — intense/dramatic tags
  # ═══════════════════════════════════════════════════════════
  instagram-reels:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    if: |
      github.event.schedule == '30 0 * * *' ||
      github.event.schedule == '30 8 * * *' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'reels')

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}

      - name: Free disk space
        run: sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc

      - name: Install packages
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg fonts-dejavu-core
          pip install requests Pillow

      - name: Create and post Instagram Reel
        run: |
          python -c "
          import os, json, sys, subprocess, requests, re, random, uuid
          OUTPUT = '/tmp/empire_output'
          os.makedirs(OUTPUT, exist_ok=True)

          GROQ  = os.environ.get('GROQ_API_KEY','')
          PIX   = os.environ.get('PIXABAY_KEY','')
          IG_ID = os.environ.get('IG_USER_ID','')
          IG_TK = os.environ.get('IG_ACCESS_TOKEN','')
          TG    = os.environ.get('TELEGRAM_TOKEN','')
          CHAT  = os.environ.get('TELEGRAM_CHAT_ID','')
          GH_TK = os.environ.get('GITHUB_TOKEN','')
          REPO  = os.environ.get('GITHUB_REPOSITORY','')

          def tg(m):
              if TG: requests.post(f'https://api.telegram.org/bot{TG}/sendMessage',
                  json={'chat_id':CHAT,'text':m,'parse_mode':'Markdown'}, timeout=15)

          def groq(p, mt=1200):
              r = requests.post('https://api.groq.com/openai/v1/chat/completions',
                  headers={'Authorization':f'Bearer {GROQ}','Content-Type':'application/json'},
                  json={'model':'llama-3.3-70b-versatile','messages':[{'role':'user','content':p}],
                        'max_tokens':mt,'temperature':0.8}, timeout=45)
              r.raise_for_status()
              return r.json()['choices'][0]['message']['content'].strip()

          # Trending topic selection — rotates niches
          niches = ['betrayal story India','true crime shocking','relationship drama reveal',
                    'business fraud exposed','family secrets devastating','justice served karma']
          niche  = random.choice(niches)

          # Generate reel content
          prompt = f'''Create a 45-55 second Instagram Reel script on: {niche}
Target: India audience (Hindi/English mix)

RULES:
- First sentence = most shocking moment, no build-up
- Use Hinglish: \"Aaj main aapko bataunga ek aisi kahani...\"
- Every line creates urgency to keep watching
- End with: \"Comment karo — kya aapke saath aisa hua hai?\"
- 130-150 words ONLY

Also provide:
- yt_title: YouTube Short title (English, US audience, 60 chars)
- ig_caption: Instagram caption with Hindi + hashtags (2200 chars max)
- hook_text: 5-7 words for text overlay

Return JSON only: {{\"script\":\"...\",\"yt_title\":\"...\",\"ig_caption\":\"...\",\"hook_text\":\"...\"}}'''

          raw = groq(prompt)
          raw = re.sub(r'^```json\\s*','',raw); raw = re.sub(r'\\s*```$','',raw)
          try: data = json.loads(raw)
          except: data = {'script': niche + ' — yeh kahani aapko hilaa degi!',
                          'yt_title': f'SHOCKING: {niche}', 'ig_caption': f'#{niche}',
                          'hook_text': 'Yeh sach hai...'}

          script = data.get('script','')
          print(f'Script: {len(script)} chars')

          # Generate audio via Groq Orpheus
          voice_id = random.choice(['troy','austin','daniel','autumn','hannah'])
          audio_path = os.path.join(OUTPUT, 'reel_audio.wav')
          text_with_tag = f'[intense] {script}'

          ar = requests.post('https://api.groq.com/openai/v1/audio/speech',
              headers={'Authorization':f'Bearer {GROQ}','Content-Type':'application/json'},
              json={'model':'canopylabs/orpheus-v1-english',
                    'input':text_with_tag[:2800],'voice':voice_id,'response_format':'wav'},
              timeout=90)

          if ar.status_code == 200 and len(ar.content) > 500:
              with open(audio_path,'wb') as f: f.write(ar.content)
              # Convert to mp3
              mp3_path = audio_path.replace('.wav','.mp3')
              subprocess.run(['ffmpeg','-y','-i',audio_path,'-codec:a','libmp3lame',
                              '-b:a','192k',mp3_path], capture_output=True)
              if os.path.exists(mp3_path): audio_path = mp3_path
          else:
              print('TTS failed — using espeak fallback')
              subprocess.run(['espeak-ng','-w',audio_path,'-s','150',script[:500]],
                             capture_output=True)

          # Download background clip
          bg_path = os.path.join(OUTPUT, 'bg.mp4')
          kw = random.choice(['dramatic dark cinematic','mystery thriller dark',
                               'emotional crying alone','justice victory triumph'])
          pr = requests.get(f'https://pixabay.com/api/videos/?key={PIX}&q={requests.utils.quote(kw)}&per_page=5&video_type=film', timeout=20)
          downloaded = False
          for hit in pr.json().get('hits',[]):
              for q in ['large','medium','small']:
                  url = hit.get('videos',{}).get(q,{}).get('url')
                  if url:
                      vr = requests.get(url, stream=True, timeout=60)
                      with open(bg_path,'wb') as f:
                          for chunk in vr.iter_content(8192): f.write(chunk)
                      if os.path.getsize(bg_path) > 10000:
                          downloaded = True
                          break
              if downloaded: break

          if not downloaded:
              subprocess.run(['ffmpeg','-y','-f','lavfi',
                              '-i','color=c=0x0d0000:size=1080x1920:r=30',
                              '-t','60',bg_path], capture_output=True)

          # Get audio duration
          probe = subprocess.run(['ffprobe','-v','quiet','-print_format','json',
                                  '-show_format',audio_path], capture_output=True, text=True)
          try: dur = float(json.loads(probe.stdout)['format']['duration'])
          except: dur = 55.0

          hook_safe = data.get('hook_text','Yeh sach hai...')[:50].replace(\"'\",'').replace(':','')

          # Assemble 9:16 reel
          video_path = os.path.join(OUTPUT, f'reel_{uuid.uuid4().hex[:8]}.mp4')
          vf = (
              'scale=1080:1920:force_original_aspect_ratio=increase,'
              'crop=1080:1920,'
              'vignette=PI/4,'
              f\"drawtext=text='{hook_safe}':fontfile=/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf:\"
              'fontsize=58:fontcolor=white:borderw=3:bordercolor=black:'
              'x=(w-text_w)/2:y=120,'
              \"drawtext=text='@betrayaldeepdive':fontfile=/usr/share/fonts/truetype/dejavu/DejaVuSans.ttf:\"
              'fontsize=32:fontcolor=white@0.8:borderw=2:bordercolor=black@0.5:'
              'x=(w-text_w)/2:y=h-70'
          )
          res = subprocess.run(['ffmpeg','-y','-stream_loop','-1','-i',bg_path,
                                '-i',audio_path,'-t',str(dur+1),'-vf',vf,
                                '-c:v','libx264','-preset','fast','-crf','23',
                                '-c:a','aac','-b:a','128k','-shortest',video_path],
                               capture_output=True)
          if res.returncode != 0:
              print('FFmpeg error:', res.stderr[-200:])
              exit(1)

          size_mb = os.path.getsize(video_path)/1024/1024
          print(f'Reel ready: {size_mb:.1f}MB')

          # Post to Instagram
          ig_ok = False
          if IG_ID and IG_TK and GH_TK and REPO:
              import time
              from datetime import date
              tag = f'reel-{date.today()}'
              h = {'Authorization':f'Bearer {GH_TK}','Accept':'application/vnd.github+json'}
              rel = requests.get(f'https://api.github.com/repos/{REPO}/releases/tags/{tag}',headers=h)
              if rel.status_code == 200:
                  rel_id = rel.json()['id']
              else:
                  rel2 = requests.post(f'https://api.github.com/repos/{REPO}/releases',
                      headers=h, json={'tag_name':tag,'name':tag,'draft':False})
                  rel_id = rel2.json()['id']

              fname = os.path.basename(video_path)
              fsize = os.path.getsize(video_path)
              with open(video_path,'rb') as f:
                  up = requests.post(
                      f'https://uploads.github.com/repos/{REPO}/releases/{rel_id}/assets?name={fname}',
                      headers={**h,'Content-Type':'video/mp4','Content-Length':str(fsize)},
                      data=f.read(), timeout=180)

              if up.status_code in (200,201):
                  pub_url = up.json().get('browser_download_url','')
                  caption = data.get('ig_caption','')[:2200]
                  cr = requests.post(f'https://graph.instagram.com/v19.0/{IG_ID}/media',
                      data={'media_type':'REELS','video_url':pub_url,
                            'caption':caption,'share_to_feed':'true','access_token':IG_TK})
                  if cr.status_code == 200:
                      cid = cr.json()['id']
                      for _ in range(30):
                          time.sleep(10)
                          sr = requests.get(f'https://graph.instagram.com/v19.0/{cid}',
                              params={'fields':'status_code','access_token':IG_TK})
                          if sr.json().get('status_code') == 'FINISHED': break
                      pr = requests.post(f'https://graph.instagram.com/v19.0/{IG_ID}/media_publish',
                          data={'creation_id':cid,'access_token':IG_TK})
                      ig_ok = pr.status_code in (200,201)

          # Upload as YouTube Short too
          yt_ok = False
          yt_url = ''
          ytcid  = os.environ.get('YOUTUBE_CLIENT_ID','')
          ytcs   = os.environ.get('YOUTUBE_CLIENT_SECRET','')
          ytrt   = os.environ.get('YOUTUBE_REFRESH_TOKEN','')
          if ytcid and ytcs and ytrt:
              tkr = requests.post('https://oauth2.googleapis.com/token',
                  data={'client_id':ytcid,'client_secret':ytcs,
                        'refresh_token':ytrt,'grant_type':'refresh_token'})
              if tkr.status_code == 200:
                  token = tkr.json()['access_token']
                  fsize = os.path.getsize(video_path)
                  body = {'snippet':{'title':data['yt_title'][:100],
                                     'description':data['ig_caption'][:2000]+' #Shorts',
                                     'tags':['Shorts','betrayal','truecrime','india'],
                                     'categoryId':'22'},
                          'status':{'privacyStatus':'public','selfDeclaredMadeForKids':False}}
                  ir = requests.post(
                      'https://www.googleapis.com/upload/youtube/v3/videos?uploadType=resumable&part=snippet,status',
                      headers={'Authorization':f'Bearer {token}',
                               'Content-Type':'application/json',
                               'X-Upload-Content-Type':'video/mp4',
                               'X-Upload-Content-Length':str(fsize)},
                      json=body)
                  if ir.status_code in (200,201):
                      with open(video_path,'rb') as f:
                          ur = requests.put(ir.headers['Location'],
                              headers={'Content-Type':'video/mp4','Content-Length':str(fsize)},
                              data=f.read(), timeout=300)
                      if ur.status_code in (200,201):
                          yt_url  = f'https://youtube.com/shorts/{ur.json()[\"id\"]}'
                          yt_ok   = True

          tg(f'''📱 *REEL PUBLISHED*
Topic: {niche[:50]}
Hook: {hook_safe}
📺 YouTube Short: {yt_url if yt_ok else 'Upload pending'}
📱 Instagram: {\"✅ Posted\" if ig_ok else \"⚠️ Check manually\"}
Size: {size_mb:.1f}MB | Duration: {dur:.0f}s''')
          print('Done.')
          "

      - name: Cleanup
        if: always()
        run: rm -rf /tmp/empire_output/ || true

  # ═══════════════════════════════════════════════════════════
  # JOB 3: PINTEREST PINS (5/day)
  # ═══════════════════════════════════════════════════════════
  pinterest-pins:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: |
      github.event.schedule == '0 4 * * *' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'pinterest')

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - run: pip install requests Pillow
      - run: mkdir -p /tmp/empire_output

      - name: Post Pinterest pins
        run: |
          cd scripts && python pinterest_poster.py || echo "Pinterest pending API approval"

      - name: Cleanup
        if: always()
        run: rm -rf /tmp/empire_output/ || true

  # ═══════════════════════════════════════════════════════════
  # JOB 4: FREELANCE ORDER PROCESSING (every 30 min)
  # ═══════════════════════════════════════════════════════════
  process-orders:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: |
      github.event.schedule == '*/30 * * * *' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'orders')

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - run: pip install requests gspread oauth2client google-auth
      - run: mkdir -p /tmp/empire_output

      - name: Process pending orders
        run: |
          python -c "
          import os, json, sys
          sys.path.insert(0, 'freelance/scripts')

          try:
              import gspread
              from oauth2client.service_account import ServiceAccountCredentials
              creds_json = os.environ.get('GOOGLE_SHEETS_CREDS','{}')
              if creds_json == '{}':
                  print('No sheets creds')
                  exit(0)
              creds_dict = json.loads(creds_json)
              scope = ['https://spreadsheets.google.com/feeds','https://www.googleapis.com/auth/drive']
              creds  = ServiceAccountCredentials.from_json_keyfile_dict(creds_dict, scope)
              client = gspread.authorize(creds)
              sheet  = client.open_by_key(os.environ['SHEETS_ID'])
              ws     = sheet.worksheet('Pending Orders')
              rows   = ws.get_all_records()
              pending = [r for r in rows if str(r.get('Status','')).lower() == 'pending']
              print(f'Pending orders: {len(pending)}')

              if not pending:
                  exit(0)

              from order_processor import process_order
              for row in pending[:3]:
                  order = {
                      'order_id':    row.get('Order ID',''),
                      'client_name': row.get('Client Name',''),
                      'client_email':row.get('Client Email',''),
                      'service_type':row.get('Service','article_pro').lower().replace(' ','_'),
                      'topic':       row.get('Topic',''),
                      'niche':       row.get('Niche',''),
                      'word_count':  int(row.get('Word Count',1500) or 1500),
                      'price_usd':   float(row.get('Price USD',0) or 0),
                      'keywords':    str(row.get('Keywords','')).split(','),
                      'target_audience': row.get('Target Audience',''),
                  }
                  result = process_order(order)
                  print(f'Order {order[\"order_id\"]}: {result.get(\"status\")}')
                  try:
                      cell = ws.find(str(row.get('Order ID','')))
                      ws.update_cell(cell.row, ws.find('Status').col, 'delivered')
                  except Exception: pass

          except Exception as e:
              print(f'Orders error: {e}')
          "

      - name: Cleanup
        if: always()
        run: rm -rf /tmp/empire_output/ || true

  # ═══════════════════════════════════════════════════════════
  # JOB 5: EMAIL SUPPORT BOT (every 30 min)
  # ═══════════════════════════════════════════════════════════
  email-support:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: |
      github.event.schedule == '*/30 * * * *' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'support')

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - run: pip install requests gspread oauth2client google-auth

      - name: Check inbox and auto-reply
        run: |
          python -c "
          import sys
          sys.path.insert(0, 'freelance/scripts')
          from support_bot import check_inbox
          import json
          result = check_inbox()
          print(json.dumps(result, indent=2))
          "

  # ═══════════════════════════════════════════════════════════
  # JOB 6: WEEKLY FINANCIAL REPORT (Sunday)
  # Complete empire status: YouTube + Instagram + Freelance
  # Revenue in USD and INR
  # ═══════════════════════════════════════════════════════════
  weekly-report:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: |
      github.event.schedule == '0 2 * * 0' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'report')

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - run: pip install requests gspread oauth2client google-auth

      - name: Send weekly empire report
        run: |
          python -c "
          import os, json, requests
          from datetime import datetime, timedelta

          bot  = os.environ.get('TELEGRAM_TOKEN','')
          chat = os.environ.get('TELEGRAM_CHAT_ID','')

          # Get YouTube stats
          yt_subs = yt_views = 0
          ytcid = os.environ.get('YOUTUBE_CLIENT_ID','')
          ytcs  = os.environ.get('YOUTUBE_CLIENT_SECRET','')
          ytrt  = os.environ.get('YOUTUBE_REFRESH_TOKEN','')
          if ytcid and ytcs and ytrt:
              tkr = requests.post('https://oauth2.googleapis.com/token',
                  data={'client_id':ytcid,'client_secret':ytcs,
                        'refresh_token':ytrt,'grant_type':'refresh_token'})
              if tkr.status_code == 200:
                  token = tkr.json()['access_token']
                  cr = requests.get('https://www.googleapis.com/youtube/v3/channels',
                      params={'part':'statistics','mine':'true'},
                      headers={'Authorization':f'Bearer {token}'})
                  if cr.status_code == 200:
                      items = cr.json().get('items',[])
                      if items:
                          stats    = items[0].get('statistics',{})
                          yt_subs  = int(stats.get('subscriberCount',0))
                          yt_views = int(stats.get('viewCount',0))

          # Get order revenue from Sheets
          week_orders = total_rev = 0
          try:
              import gspread
              from oauth2client.service_account import ServiceAccountCredentials
              creds_json = os.environ.get('GOOGLE_SHEETS_CREDS','{}')
              if creds_json != '{}':
                  creds_dict = json.loads(creds_json)
                  scope = ['https://spreadsheets.google.com/feeds','https://www.googleapis.com/auth/drive']
                  creds  = ServiceAccountCredentials.from_json_keyfile_dict(creds_dict, scope)
                  client = gspread.authorize(creds)
                  sheet  = client.open_by_key(os.environ.get('SHEETS_ID',''))
                  ws     = sheet.worksheet('Orders')
                  rows   = ws.get_all_records()
                  week_ago    = (datetime.now()-timedelta(days=7)).strftime('%Y-%m-%d')
                  week_rows   = [r for r in rows if str(r.get('Date',''))[:10] >= week_ago]
                  week_orders = len(week_rows)
                  total_rev   = sum(float(r.get('Price USD',0) or 0) for r in week_rows)
          except Exception as e:
              print(f'Sheets error: {e}')

          # Revenue projections
          yt_rpm     = 10.0
          est_yt_rev = (yt_subs * 0.3 * 4 / 1000) * yt_rpm
          total_usd  = est_yt_rev + total_rev
          total_inr  = total_usd * 83

          yt_pct  = round(yt_subs/500000*100, 1)

          msg = f'''📊 *BETRAYAL DEEPDIVE — WEEKLY EMPIRE REPORT*
{datetime.now().strftime('%d %b %Y')}
━━━━━━━━━━━━━━━━━━━━

📺 *YOUTUBE:*
• Subscribers: *{yt_subs:,}* ({yt_pct}% of 500K goal)
• Total views: {yt_views:,}
• Est. monthly revenue: *\${est_yt_rev:,.0f}*

💼 *FREELANCE (this week):*
